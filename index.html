      const SLEEVE_TO_ASSET_CLASS = {
        "Úroková složka":    "bonds",

      };

      /**
       * Converts a funds array (preset or custom) to a weighted allocation object
       * suitable for weightedPeriodReturns(). For funds with actual NAV data in
       * FUND_DAILY_RETURNS the fund name is used as key directly; for all others
       * the sleeve proxy (bonds / stocks / alternatives) is used as fallback.
       *
       * @param {Array}  funds            - [{name, weight, sleeve}, ...]
       * @param {Object} fallbackAllocation - original {bonds, stocks, alternatives} object
       * @returns {Object}               - weighted allocation keyed by fund name or sleeve key
       */
      function normalizeFundNameKey(name) {
        return String(name || "").replace(/\u00a0/g, " ").replace(/\s+/g, " ").trim().toLowerCase();
      }

      function getFundReturnSeries(fundName, currency = "CZK") {
        const isin = KNOWN_ISINS_BY_CURRENCY?.[currency]?.[fundName];
        if (isin && FUND_WEEKLY_RETURNS_BY_ISIN[isin]) return FUND_WEEKLY_RETURNS_BY_ISIN[isin];
        const normalized = normalizeFundNameKey(fundName);
        if (FUND_WEEKLY_RETURNS_BY_NORMALIZED_NAME[normalized]) {
          return FUND_WEEKLY_RETURNS_BY_NORMALIZED_NAME[normalized];
        }
        if (FUND_DAILY_RETURNS[fundName]) {
          return aggregateDailyReturnsToWeekly(FUND_DAILY_RETURNS[fundName]);
        }
        return null;
      }

      function fundsBasedAllocation(funds, fallbackAllocation, currency = "CZK") {
        if (!funds || !funds.length) return fallbackAllocation;
        const alloc = {};
        const sleeveRemainder = {};
        funds.forEach((fund) => {
          const w = Number(fund.weight) || 0;
          if (w <= 0) return;
          const isin = KNOWN_ISINS_BY_CURRENCY?.[currency]?.[fund.name];
          if (isin && FUND_WEEKLY_RETURNS_BY_ISIN[isin]) {
            const key = `ISIN::${isin}`;
            alloc[key] = (alloc[key] || 0) + w;
            return;
          }
          if (getFundReturnSeries(fund.name, currency)) {
            alloc[fund.name] = (alloc[fund.name] || 0) + w;
            return;
          }
          const simKey = `SIM::${simulationProfileForFund(fund.name, currency, fund.sleeve)}`;
          sleeveRemainder[simKey] = (sleeveRemainder[simKey] || 0) + w;
        });
        Object.entries(sleeveRemainder).forEach(([key, w]) => {
          alloc[key] = (alloc[key] || 0) + w;
        });
        return alloc;
      }

      function convertAmount(amount, from, to) {
        if (from === to) return amount;
        const raw = (amount * FX_RATES_IN_CZK[from]) / FX_RATES_IN_CZK[to];
        if (to === "CZK") return roundNiceCZK(raw);
        return Math.round(raw / 100) * 100;
      }
      const InvestmentContext = createContext(null);

      function InvestmentProvider({ children }) {
        const [currency, setCurrencyState] = useState("CZK");
        const [initialInvestment, setInitialInvestment] = useState(1_000_000);
        const [monthlyContribution, setMonthlyContribution] = useState(0);
        const [appMode, setAppMode] = useState("erste-premier");

        const setCurrency = (next) => {
          setCurrencyState((prev) => {
            if (prev === next) return prev;
            setInitialInvestment((amount) => convertAmount(amount, prev, next));
            setMonthlyContribution((amount) => convertAmount(amount, prev, next));
            return next;
          });
        };

        const value = useMemo(() => {
          const formatMoney = (amount, opts) => {
            const locale = currency === "CZK" ? "cs-CZ" : currency === "EUR" ? "de-DE" : "en-US";
            return new Intl.NumberFormat(locale, {
              style: "currency",
              currency,
              maximumFractionDigits: 0,
              notation: opts && opts.compact ? "compact" : "standard",
            }).format(amount);
          };
          return {
            currency,
            setCurrency,
            initialInvestment,
            setInitialInvestment,
            monthlyContribution,
            setMonthlyContribution,
            fxRate: FX_RATES_IN_CZK[currency] || 1,
            formatMoney,
            appMode,
            setAppMode,
          };
        }, [currency, initialInvestment, monthlyContribution, appMode]);

        return (
          <InvestmentContext.Provider value={value}>
            {children}
          </InvestmentContext.Provider>
        );

        const ctx = useContext(InvestmentContext);
        if (!ctx)

<label className="group flex items-center gap-2 rounded-xl border border-white/15 bg-white/5 px-3 py-1.5 backdrop-blur transition focus-within:border-ep-gold/70 focus-within:bg-white/10 lg:w-[420px]">

        const { currency, initialInvestment, monthlyContribution, formatMoney } = useInvestment();
        const chartId = useId().replace(/:/g, "");

        const [viewMode, setViewMode] = useState("value");

          setCompareStrategyIds(defaultComparisonIds || []);

        useEffect(() => {
          if (compareStrategyIds.length > 0) {
            setShowSleeves(false);

        const activeComparisonStrategies = useMemo(
          () => comparisonStrategies.filter((strategy) => compareStrategyIds.includes(strategy.id)),

        const activeSleeveSeries = useMemo(

        const rawData = useMemo(() => buildPerformanceSeries(allocation, initialInvestment, effectiveMonthlyContribution, funds, currency), [allocation, funds, initialInvestment, effectiveMonthlyContribution, currency]);
        const allComparisonSeriesMap = useMemo(() => {
          const entries = comparisonStrategies.map((strategy) => [

            buildPerformanceSeries(strategy.allocation, initialInvestment, effectiveMonthlyContribution, strategy.funds || null, currency),

        }, [comparisonStrategies, initialInvestment, effectiveMonthlyContribution, currency]);
        const data = useMemo(() => {

        }, [rawData, viewMode, compareStrategyIds, allComparisonSeriesMap, comparisonStrategies]);
        const portfolioKey = viewMode === "percent" ? "portfolioPct" : "portfolio";

            // Weekly data: filter by date range (not slice-by-count)
            const lastTs = data[data.length - 1].ts;

            filtered = data.filter((row) => row.ts >= cutoff.getTime());

            filtered = data;

          return buildStartAnchoredDisplayData(filtered, activeDataKeys, {
            mode: viewMode,
            referenceValue,

              contributed: initialInvestment,

        // Show one tick per quarter (approximately every 63 trading days)

      function PortfolioDetailEditor({ portfolio, onAllocationChange, activeMode = "EP" }) {
        const { currency, initialInvestment, monthlyContribution, formatMoney } = useInvestment();
        const [funds, setFunds] = useState(() => getTemplateFundsForCurrency(portfolio, currency));
        const [showSearch, setShowSearch] = useState(false);
        const [searchQuery, setSearchQuery] = useState("");
        const [filterSleeve, setFilterSleeve] = useState("Všechny složky");

        useEffect(() => {
          setFunds(getTemplateFundsForCurrency(portfolio, currency));
          setShowSearch(false);
          setSearchQuery("");
          setFilterSleeve("Všechny složky");
        }, [portfolio, currency]);

        useEffect(() => {
          onAllocationChange(funds);
        }, [funds, onAllocationChange]);

        const total = funds.reduce((sum, fund) => sum + (Number(fund.weight) || 0), 0);
        const sleeveOrder = ["Úroková složka", "Akciová složka", "Alternativní složka"];
        const sleeveCaps = {
          "Úroková složka": portfolio.allocation?.bonds || 0,
          "Akciová složka": portfolio.allocation?.stocks || 0,
          "Alternativní složka": portfolio.allocation?.alternatives || 0,
        };
        const sleeveTone = {
          "Úroková složka": "bg-sky-50 text-sky-700 border-sky-200",
          "Akciová složka": "bg-indigo-50 text-indigo-700 border-indigo-200",
          "Alternativní složka": "bg-amber-50 text-amber-700 border-amber-200",
        };
        const existingFundNames = new Set(funds.map((fund) => fund.name.trim().toLowerCase()));
        const grouped = funds.reduce((acc, fund) => {
          if (!acc[fund.sleeve]) acc[fund.sleeve] = [];
          acc[fund.sleeve].push(fund);
          return acc;
        }, {});
        const orderedGroups = sleeveOrder.filter((key) => grouped[key]).map((key) => [key, grouped[key]]);

        const getSleeveTotal = (sleeve, excludeIndex = -1) =>
          funds.reduce((sum, fund, i) => {
            if (i === excludeIndex || fund.sleeve !== sleeve) return sum;
            return sum + (Number(fund.weight) || 0);
          }, 0);

        const getMaxWeightForIndex = (index) => {
          const current = funds[index];
          if (!current) return 0;
          const totalWithoutCurrent = funds.reduce((sum, fund, i) => {
            if (i === index) return sum;
            return sum + (Number(fund.weight) || 0);
          }, 0);
          const sleeveWithoutCurrent = getSleeveTotal(current.sleeve, index);
          const totalCap = 100 - totalWithoutCurrent;
          const sleeveCap = (sleeveCaps[current.sleeve] || 0) - sleeveWithoutCurrent;
          return Math.max(0, Math.min(totalCap, sleeveCap));
        };

        const clampWeightForIndex = (index, nextValue) => {
          const maxAllowed = getMaxWeightForIndex(index);
          return Math.max(0, Math.min(maxAllowed, Math.round(Number(nextValue) || 0)));
        };

        const updateFundWeight = (index, value) => {
          setFunds((prev) =>
            prev.map((fund, i) =>
              i === index
                ? { ...fund, weight: clampWeightForIndex(index, value) }
                : fund
            )
          );
        };

        const removeFund = (index) => {
          setFunds((prev) => prev.filter((_, i) => i !== index));
        };

        const resetFunds = () => {
          setFunds(getTemplateFundsForCurrency(portfolio, currency));
          setShowSearch(false);
          setSearchQuery("");
          setFilterSleeve("Všechny složky");

        const activeFunds = (ALL_FUNDS_BY_CURRENCY[currency] || []).filter(
          (fund) => activeMode !== "MMA" || isMmaFundName(fund.name)
        );
        const activeIsins = KNOWN_ISINS_BY_CURRENCY[currency] || {};
        const availableFunds = activeFunds.filter((fund) => {
          const matchesSleeve = filterSleeve === "Všechny složky" ? true : fund.sleeve === filterSleeve;
          const matchesQuery = matchesFundSearch({ ...fund, isin: activeIsins[fund.name] || "" }, searchQuery);
          const notAlreadyUsed = !existingFundNames.has(fund.name.trim().toLowerCase());
          return matchesSleeve && matchesQuery && notAlreadyUsed;
        });

        const addSelectedFund = (fund) => {
          setFunds((prev) => [...prev, { name: fund.name, sleeve: fund.sleeve, weight: 0 }]);
          setShowSearch(false);
          setSearchQuery("");
        };

        const isinFor = (fundName) => activeIsins[fundName] || "";
        const amountForFund = (fund) => amountForFundDisplay(fund, funds, initialInvestment, monthlyContribution, sleeveCaps, formatMoney);
        const renderAmountCell = (fund, compact = false) => {
          const amount = amountForFund(fund);
          return (
            <div className={compact ? "text-left" : "text-right"}>
              <div className="text-xs font-semibold tabular-nums ep-text-navy">{amount.oneTime}</div>
            </div>
          );
        };

        return (
          <section className="rounded-2xl border border-slate-200 bg-white p-3 shadow-premium md:p-5">
            <div className="mb-3 flex flex-col gap-3 lg:flex-row lg:items-start lg:justify-between">
              <div>
                <h3 className="text-sm font-semibold ep-text-navy md:text-base">Složení a alokace fondů</h3>
                <p className="mt-1 text-[11px] font-semibold text-slate-600 md:text-xs">{portfolio.name}</p>
                <p className="text-[11px] text-slate-500 md:text-xs">U každého fondu vidíš podíl v % i odpovídající jednorázovou částku. Limity portfolia a složek zůstávají uzamčené.</p>
              </div>
              <div className="flex flex-wrap items-center gap-2 lg:justify-end">

                {activeMode !== "MMA" && (
                  <>
                    <button type="button" onClick={resetFunds} className="inline-flex items-center justify-center gap-1.5 rounded-xl border border-slate-200 bg-white px-3 py-2 text-[11px] font-semibold ep-text-navy transition hover:border-ep-blue/40 hover:bg-slate-50"><RotateCcwIcon size={14} />Obnovit výchozí</button>
                    <button type="button" onClick={() => setShowSearch((prev) => !prev)} className="inline-flex items-center justify-center gap-1.5 rounded-xl bg-ep-blue px-3 py-2 text-[11px] font-semibold text-white transition hover:bg-ep-blue-light">+ Přidat fond</button>
                  </>
                )}
              </div>
            </div>

            {showSearch && (
              <div className="mb-4 rounded-2xl border border-ep-blue/20 bg-slate-50 p-3 fade-in">
                <div className="grid gap-2 lg:grid-cols-[minmax(0,1fr)_220px] lg:items-center">
                  <input type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder="Hledat fond nebo ISIN..." className="min-w-0 rounded-xl border border-slate-300 bg-white px-4 py-2.5 text-sm text-slate-700 outline-none focus:border-ep-blue focus:ring-2 focus:ring-ep-blue/20" aria-label="Hledat fond nebo ISIN" />
                  <select value={filterSleeve} onChange={(e) => setFilterSleeve(e.target.value)} className="min-w-0 rounded-xl border border-slate-300 bg-white px-4 py-2.5 text-sm text-slate-700 outline-none focus:border-ep-blue focus:ring-2 focus:ring-ep-blue/20" aria-label="Filtrovat složku fondu">

                          <div className="text-[11px] text-slate-500">{fund.sleeve}{isinFor(fund.name) ? ` · ISIN ${isinFor(fund.name)}` : " · ISIN doplníme"}</div>

                      </button>

                  </div>
                </div>
              </div>
            )}

            <div className="rounded-2xl border border-slate-200 bg-slate-50/70">
              <div className={`grid gap-2 border-b border-slate-200 px-3 py-2 text-[10px] font-semibold uppercase tracking-wide text-slate-500 ${activeMode === "MMA" ? "grid-cols-[minmax(0,1fr)_minmax(88px,0.5fr)_minmax(120px,0.7fr)]" : "grid-cols-[minmax(0,1.5fr)_minmax(120px,0.75fr)_minmax(88px,0.5fr)_32px] md:grid-cols-[minmax(0,1.7fr)_minmax(170px,0.9fr)_minmax(88px,0.5fr)_minmax(120px,0.7fr)_32px]"}`}>

                    <div>
                      {items.map((fund, rowIndex) => {
                        const originalIndex = funds.findIndex((f) => f === fund);

                      {isSelected ? (<><CheckCircle2Icon size={16} />Zrušit výběr</>) : (<><LineChartIcon size={16} />Zobrazit detail portfolia</>)}

                  defaultComparisonIds={selected ? [] : presetPortfolios.filter((p) => p.id !== activePortfolio.id).map((p) => p.id)}

      function getClosestPortfolioProfile(funds, currency) {
        if (!funds || !funds.length) {
          return {
            label: "Nejkonzervativnější strategie",
            nearestId: "rrc1",
            nearestName: "RŘC1",
            nearestRiskLabel: "Nejkonzervativnější strategie",
            score: 0,
            isCustom: false,
          };
        }

        const currentMap = {};
        funds.forEach((fund) => {
          currentMap[fund.name] = Number(fund.weight) || 0;
        });

        const comparisons = PRESET_PORTFOLIOS.map((preset) => {
          const presetMap = {};
          getTemplateFundsForCurrency(preset, currency).forEach((fund) => {
            presetMap[fund.name] = Number(fund.weight) || 0;
          });
          const allFundNames = new Set([...Object.keys(currentMap), ...Object.keys(presetMap)]);
          let score = 0;
          allFundNames.forEach((fundName) => {
            score += Math.abs((currentMap[fundName] || 0) - (presetMap[fundName] || 0));
          });
          return {
            id: preset.id,
            name: preset.name,
            label: preset.riskLabel,
            score,
          };
        }).sort((a, b) => a.score - b.score);

        const best = comparisons[0];
        return {
          label: best.label,
          nearestId: best.id,
          nearestName: best.name,
          nearestRiskLabel: best.label,
          score: best.score,
          isCustom: best.score > 20,
        };
      }

      function CustomPortfolioBuilder() {
        const { currency, initialInvestment, monthlyContribution, formatMoney } = useInvestment();

        };

        const total = useMemo(
          () => funds.reduce((sum, fund) => sum + (Number(fund.weight) || 0), 0),

        const valid = total === 100;
        const profile = useMemo(() => getClosestPortfolioProfile(funds, currency), [funds, currency]);

        const grouped = useMemo(() => funds.reduce((acc, fund) => {
          if (!acc[fund.sleeve]) acc[fund.sleeve] = [];
          acc[fund.sleeve].push(fund);
          return acc;
        }, {}), [funds]);
        const orderedGroups = sleeveOrder.filter((key) => grouped[key]).map((key) => [key, grouped[key]]);

        const detailAllocation = useMemo(() => {
          return funds.reduce((acc, fund) => {
            const bucket = fund.sleeve === "Úroková složka" ? "bonds" : fund.sleeve === "Akciová složka" ? "stocks" : "alternatives";
            acc[bucket] += Number(fund.weight) || 0;
            return acc;
          }, { bonds: 0, stocks: 0, alternatives: 0 });

        const customStats = useMemo(() => {
          const portPerf = computePortfolioPerf(funds, currency);
          return { ...computeStats(detailAllocation, initialInvestment, funds, currency), ...portPerf };
        }, [detailAllocation, initialInvestment, funds, currency]);
        const customBaseStrategyId = useMemo(() => {
          return activeTemplate !== "custom" ? activeTemplate : null;

        const sleeveAllocationMap = useMemo(() => ({
          "Úroková složka": detailAllocation.bonds || 0,
          "Akciová složka": detailAllocation.stocks || 0,
          "Alternativní složka": detailAllocation.alternatives || 0,

        const existingFundNames = new Set(funds.map((fund) => fund.name.trim().toLowerCase()));
        const activeFunds = ALL_FUNDS_BY_CURRENCY[currency] || [];
        const activeIsins = KNOWN_ISINS_BY_CURRENCY[currency] || {};
        const availableFunds = activeFunds.filter((fund) => {
          const matchesSleeve = filterSleeve === "Všechny složky" ? true : fund.sleeve === filterSleeve;
          const matchesQuery = matchesFundSearch({ ...fund, isin: activeIsins[fund.name] || "" }, searchQuery);
          const notAlreadyUsed = !existingFundNames.has(fund.name.trim().toLowerCase());
          return matchesSleeve && matchesQuery && notAlreadyUsed;
        });

        const templateOrder = [{ id: "custom", label: "Prázdné portfolio" }, ...PRESET_PORTFOLIOS.map((p) => ({ id: p.id, label: p.name }))];

        useEffect(() => {
          const template = activeTemplate !== "custom" ? PRESET_PORTFOLIOS.find((p) => p.id === activeTemplate) : null;
          if (template) {
            setFunds(getTemplateFundsForCurrency(template, currency));
          } else {
            setFunds((prev) => filterFundsByCurrency(prev, currency));
          }
          setShowSearch(false);
          setSearchQuery("");
          setFilterSleeve("Všechny složky");
          setShowSimulation(false);
        }, [currency, activeTemplate]);

        const loadTemplate = (id) => {
          if (id === "custom") {
            setFunds([]);
            setActiveTemplate("custom");
            setShowSearch(false);
            setSearchQuery("");
            setFilterSleeve("Všechny složky");
            setShowSimulation(false);
            return;

          return Math.max(0, 100 - totalWithoutCurrent);
        };

        const clampWeightForIndex = (index, nextValue) => {
          const maxAllowed = getMaxWeightForIndex(index);
          return Math.max(0, Math.min(maxAllowed, Math.round(Number(nextValue) || 0)));
        };

        const updateFundWeight = (index, value) => {
          setFunds((prev) => prev.map((fund, i) => i === index ? { ...fund, weight: clampWeightForIndex(index, value) } : fund));
          setActiveTemplate("custom");
          setShowSimulation(false);

          setFunds((prev) => prev.filter((_, i) => i !== index));

          setShowSimulation(false);

                    <div className="text-[10px] uppercase tracking-widest text-slate-500">Profil portfolia</div>
                    <div className="text-sm font-semibold ep-text-navy">{profile.isCustom ? `Vlastní skladba (nejblíže: ${profile.nearestRiskLabel})` : profile.label}</div>

        "Komodity": "#7c3aed",
        "Smíšené": "#0d9488",
      };

      function HomeScreen({ onNavigate }) {

          <div className="min-h-screen bg-ep-gradient flex flex-col">

                  style={{ background: "rgba(255,255,255,0.07)" }}
                >
                  <div className="mb-5 flex h-12 w-12 items-center justify-center rounded-xl border border-white/20 bg-white/10">

                  <p className="text-sm leading-relaxed text-white/65">

                    Sestavte vlastní portfolio a získejte analytický report.
                  </p>
                  <div className="mt-5 inline-flex items-center gap-1.5 text-xs font-semibold text-ep-gold/90 group-hover:text-ep-gold">
                    Otevřít <span aria-hidden>→</span>
                  </div>
                </button>

                <button
                  type="button"
                  onClick={() => onNavigate("neni-investice")}
                  className="group relative flex flex-col rounded-2xl border border-white/20 bg-white/8 p-7 text-left backdrop-blur transition-all duration-300 hover:border-ep-gold/60 hover:bg-white/15 hover:shadow-premium focus:outline-none focus:ring-2 focus:ring-ep-gold/40"
                  style={{ background: "rgba(255,255,255,0.07)" }}
                >
                  <div className="mb-5 flex h-12 w-12 items-center justify-center rounded-xl border border-white/20 bg-white/10">
                    <BarChart3Icon size={24} className="text-ep-gold" />

                  <h2 className="mb-2 font-serif text-xl font-semibold text-white">
                    Není investice jako investice
                  </h2>
                  <p className="text-sm leading-relaxed text-white/65">
                    Porovnejte historické výkonnosti fondů z nabídky Erste Premier
                    a zjistěte, jak se jednotlivé fondy skutečně lišily.
                  </p>
                  <div className="mt-5 inline-flex items-center gap-1.5 text-xs font-semibold text-ep-gold/90 group-hover:text-ep-gold">
                    Otevřít <span aria-hidden>→</span>
                  </div>
                </button>
              </div>

              <p className="mt-12 text-center text-[11px] text-white/35 tracking-wide">
                © {new Date().getFullYear()} Erste Premier · Demo · Nejedná se o investiční doporučení.
              </p>
            </div>
          </div>
        );
      }

      /* ------------------------------------------------------------------ */
      /*  Není investice jako investice — fund performance explorer          */
      /* ------------------------------------------------------------------ */
      function NeniInvesticeApp({ onNavigate, activeMode, setActiveMode }) {
        const {
          currency,
          setCurrency,
          initialInvestment,
          setInitialInvestment,
          monthlyContribution,
          setMonthlyContribution,
        } = useInvestment();
        const [category, setCategory] = useState("Vše");
        const [subCategory, setSubCategory] = useState("Všechny podtřídy");
        const [search, setSearch] = useState("");
        const [sleeveFilter, setSleeveFilter] = useState("Všechny složky");
        const [selectedFunds, setSelectedFunds] = useState([]);
        const [viewMode, setViewMode] = useState("value");
        const [horizonMonths, setHorizonMonths] = useState(60);
        const TIMELINE_MIN =
          TIMELINE.length > 0
            ? `${TIMELINE[0].date.getFullYear()}-${String(TIMELINE[0].date.getMonth() + 1).padStart(2, "0")}`
            : "";
        const TIMELINE_MAX =
          TIMELINE.length > 0
            ? `${TIMELINE[TIMELINE.length - 1].date.getFullYear()}-${String(TIMELINE[TIMELINE.length - 1].date.getMonth() + 1).padStart(2, "0")}`
            : "";
        const [customDateFrom, setCustomDateFrom] = useState(TIMELINE_MIN);
        const [customDateTo, setCustomDateTo] = useState(TIMELINE_MAX);
        const minStep = currency === "CZK" ? 50000 : 2000;
        const monthlyStep = currency === "CZK" ? 5000 : 200;
        const currencyOptions = activeMode === "MMA" ? ["CZK"] : ["CZK", "EUR", "USD"];

        useEffect(() => {
          if (activeMode === "MMA" && currency !== "CZK") {
            setCurrency("CZK");
          }
          if (activeMode === "MMA") {
            setSubCategory("Všechny podtřídy");
          }
        }, [activeMode, currency, setCurrency]);

        const perfData = FUND_PERF_DATA[currency] || {};
        const activeCatalogFunds = (ALL_FUNDS_BY_CURRENCY[currency] || []).filter(
          ({ name }) => activeMode !== "MMA" || isMmaFundName(name)
        );
        const activeIsins = KNOWN_ISINS_BY_CURRENCY[currency] || {};
        const isinFor = (fundName) => activeIsins[fundName] || "";

        // Build flat list of all funds available in Zpětná modelace for the selected currency.
        const allFunds = useMemo(() => {
          return activeCatalogFunds.map(({ name, sleeve, isin: fundIsin }) => {
            const perf = perfData[name] || {};
            const isin = fundIsin || isinFor(name);
            const categoryInfo = getFundCategoryInfo(name, currency, isin, sleeve);
            return {
              id: `${name}::${isin || currency}`,
              name,
              currency,
              sleeve,
              isin,
              category: categoryInfo.categoryLabel,
              mainCategory: categoryInfo.main,
              subCategory: categoryInfo.sub,
              p1y: perf.p1y ?? null,
              p3y: perf.p3y ?? null,
              p5y: perf.p5y ?? null,
            };
          });
        }, [activeCatalogFunds, perfData, activeIsins, currency]);

        const categories = useMemo(() => {
          const cats = new Set(allFunds.map((f) => f.mainCategory));
          const categoryOrder = activeMode === "MMA" ? MMA_MAIN_CATEGORY_ORDER : MAIN_CATEGORY_ORDER;
          return ["Vše", ...categoryOrder.filter((cat) => cats.has(cat))];
        }, [allFunds, activeMode]);
        // Sub-categories available for the currently selected main category
        const subCategories = useMemo(() => {
          const relevantFunds = category === "Vše" ? allFunds : allFunds.filter((f) => f.mainCategory === category);
          const subs = new Set(relevantFunds.map((f) => f.subCategory).filter(Boolean));
          const orderedSubs = (SUBCATEGORY_ORDER[category] || []).filter((s) => subs.has(s));
          const extraSubs = Array.from(subs).filter((s) => !orderedSubs.includes(s)).sort();
          return ["Všechny podtřídy", ...orderedSubs, ...extraSubs];
        }, [allFunds, category]);

        useEffect(() => {
          if (!categories.includes(category)) {
            setCategory("Vše");
            setSubCategory("Všechny podtřídy");
          }
        }, [categories, category]);

        useEffect(() => {
          if (!subCategories.includes(subCategory)) {
            setSubCategory("Všechny podtřídy");
          }
        }, [subCategories, subCategory]);
        // Reset sub-category when main category changes
        useEffect(() => {
          if (!subCategories.includes(subCategory)) setSubCategory("Všechny podtřídy");
        }, [subCategories, subCategory]);
        const sleeveOptions = useMemo(() => {
          const sleeves = new Set(allFunds.map((f) => f.sleeve).filter(Boolean));
          return ["Všechny složky", ...Array.from(sleeves).sort()];
        }, [allFunds]);
        useEffect(() => {
          if (!sleeveOptions.includes(sleeveFilter)) {
            setSleeveFilter("Všechny složky");
          }
        }, [sleeveOptions, sleeveFilter]);

        const filtered = useMemo(() => {
          let list = allFunds;
          if (category !== "Vše") list = list.filter((f) => f.mainCategory === category);
          if (subCategory !== "Všechny podtřídy") list = list.filter((f) => f.subCategory === subCategory);
          if (sleeveFilter !== "Všechny složky") list = list.filter((f) => f.sleeve === sleeveFilter);
          if (search.trim()) list = list.filter((f) => matchesFundSearch(f, search, [f.isin]));
          list = [...list].sort((a, b) => {
            const mainRankA = MAIN_CATEGORY_ORDER.indexOf(a.mainCategory);
            const mainRankB = MAIN_CATEGORY_ORDER.indexOf(b.mainCategory);
            const mainDiff = (mainRankA === -1 ? 99 : mainRankA) - (mainRankB === -1 ? 99 : mainRankB);
            if (mainDiff !== 0) return mainDiff;
            const subOrder = SUBCATEGORY_ORDER[a.mainCategory] || [];
            const subRankA = subOrder.indexOf(a.subCategory);
            const subRankB = subOrder.indexOf(b.subCategory);
            const subDiff = (subRankA === -1 ? 99 : subRankA) - (subRankB === -1 ? 99 : subRankB);
            if (subDiff !== 0) return subDiff;
            return a.name.localeCompare(b.name, "cs");
          });
          return list;
        }, [allFunds, category, subCategory, sleeveFilter, search]);

        useEffect(() => {
          setSelectedFunds((prev) => prev.filter((fundId) => allFunds.some((fund) => fund.id === fundId)));
        }, [allFunds]);

        const toggleFund = (fundId) => {
          setSelectedFunds((prev) =>
            prev.includes(fundId)
              ? prev.filter((id) => id !== fundId)
              : prev.length >= 8
              ? [...prev.slice(1), fundId]
              : [...prev, fundId]
          );
        };

        // For comparison chart: selected funds
        const compFunds = useMemo(
          () => allFunds.filter((f) => selectedFunds.includes(f.id)),
          [allFunds, selectedFunds]
        );

        const formatMoney = useMemo(() => {
          const locale = currency === "CZK" ? "cs-CZ" : currency === "EUR" ? "de-DE" : "en-US";
          return (amount, opts) =>
            new Intl.NumberFormat(locale, {
              style: "currency",
              currency,
              maximumFractionDigits: 0,
              notation: opts && opts.compact ? "compact" : "standard",
            }).format(amount);
        }, [currency]);

        const growthData = useMemo(() => {
          // Pre-compute real NAV-based series for all funds that have daily return data
          const realSeries = {};
          compFunds.forEach((f) => {
            const returns = getFundReturnSeries(f.name, currency);
            if (returns) {
              realSeries[f.id] = computeVariableRateSeries(
                initialInvestment,
                monthlyContribution,
                returns
              );
            }
          });
          return TIMELINE.map((point, index) => {
            const row = {
              date: point.label,
              ts: point.date.getTime(),
            };
            // monthsSinceStart: number of full calendar months elapsed since the series start
            const monthsSinceStart = point.monthsSinceStart;
            compFunds.forEach((f) => {
              // Use real NAV-based weekly growth when available
              if (realSeries[f.id]) {
                const value = realSeries[f.id][index] ?? null;
                const investedBase = initialInvestment + monthlyContribution * monthsSinceStart;
                row[f.id] = value !== null ? +value.toFixed(2) : null;
                row[`${f.id}Pct`] =
                  value !== null && investedBase > 0
                    ? +(((value / investedBase) - 1) * 100).toFixed(2)
                    : null;
                return;
              }
              const annualRate = f.p5y ?? f.p3y ?? f.p1y;
              if (annualRate === null || annualRate === undefined) {
                row[f.id] = null;
                row[`${f.id}Pct`] = null;
                return;
              }
              const monthlyRate = Math.pow(1 + annualRate / 100, 1 / 12) - 1;
              const monthCount = monthsSinceStart;
              const value =
                monthlyRate === 0
                  ? initialInvestment + monthlyContribution * monthCount
                  : initialInvestment * Math.pow(1 + monthlyRate, monthCount) +
                    monthlyContribution * ((Math.pow(1 + monthlyRate, monthCount) - 1) / monthlyRate);
              const investedBase = initialInvestment + monthlyContribution * monthCount;
              row[f.id] = +value.toFixed(2);
              row[`${f.id}Pct`] =
                investedBase > 0 ? +(((value / investedBase) - 1) * 100).toFixed(2) : null;
            });
            return row;
          });
        }, [compFunds, initialInvestment, monthlyContribution]);
        const neniDataKeys = useMemo(
          () => compFunds.map((f) => (viewMode === "percent" ? `${f.id}Pct` : f.id)),
          [compFunds, viewMode]
        );
        const referenceValue = viewMode === "percent" ? 0 : initialInvestment;

        const displayData = useMemo(() => {
          let filtered;
          if (horizonMonths === "custom") {
            const fromTs = customDateFrom ? new Date(customDateFrom + "-01").getTime() : -Infinity;
            const toTs = customDateTo
              ? (() => {
                  const d = new Date(customDateTo + "-01");
                  d.setMonth(d.getMonth() + 1);
                  return d.getTime() - 1;
                })()
              : Infinity;
            filtered = growthData.filter((row) => row.ts >= fromTs && row.ts <= toTs);
          } else if (horizonMonths && growthData.length > 0) {
            // Filter by date range
            const lastTs = growthData[growthData.length - 1].ts;
            const cutoff = new Date(lastTs);
            cutoff.setMonth(cutoff.getMonth() - horizonMonths);
            filtered = growthData.filter((row) => row.ts >= cutoff.getTime());
          } else {
            filtered = growthData;
          }
          return buildStartAnchoredDisplayData(filtered, neniDataKeys, {
            mode: viewMode,
            referenceValue,
            anchorOverrides: {
              referenceValue,
            },
          });
        }, [growthData, horizonMonths, customDateFrom, customDateTo, neniDataKeys, viewMode, referenceValue]);

        const xTicks = useMemo(() => {
          const seen = new Set();
          return displayData.filter((d) => {
            const dt = new Date(d.ts);
            const qKey = `${dt.getFullYear()}-${Math.floor(dt.getMonth() / 3)}`;
            if (seen.has(qKey)) return false;
            seen.add(qKey);
            return true;
          }).map((d) => d.date);
        }, [displayData]
        );
        const finalRow = displayData.length ? displayData[displayData.length - 1] : null;
        const chartLabelValue = viewMode === "percent" ? "Konečná výkonnost" : "Konečná hodnota";
        const neniYAxis = useMemo(
          () =>
            computeChartAxis(displayData, neniDataKeys, {
              fallbackMin: viewMode === "percent" ? -5 : Math.max(0, initialInvestment * 0.95),
              fallbackMax: viewMode === "percent" ? 5 : Math.max(1, initialInvestment * 1.05),
              anchorValues: [referenceValue],
              investedAmount: viewMode === "value" ? initialInvestment : null,
              mode: viewMode,
            }),
          [displayData, neniDataKeys, viewMode, initialInvestment, referenceValue]
        );
        const HORIZON_OPTIONS = [
          { label: "1R", months: 12, title: "Poslední rok" },
          { label: "3R", months: 36, title: "Poslední 3 roky" },
          { label: "5L", months: 60, title: "5 let" },
          { label: "Vlastní", months: "custom", title: "Vlastní rozsah dat" },
        ];

        const fmtPct = (v) => {
          if (v === null || v === undefined) return <span className="text-slate-400">–</span>;
          const positive = v >= 0;
          return (
            <span className={"font-semibold tabular-nums " + (positive ? "text-emerald-600" : "text-rose-600")}>
              {(positive ? "+" : "") + v.toFixed(2)} %
            </span>
          );
        };

        return (
          <div className="min-h-screen" style={{ background: "#f6f8fc" }}>
            {/* Header */}
            <header className="sticky top-0 z-40 bg-ep-gradient text-white shadow-premium">
              <div className="absolute inset-0 bg-ep-radial pointer-events-none" />
              <div className="relative mx-auto flex max-w-[1400px] flex-col gap-2.5 px-4 py-2.5 md:px-7 md:py-3">
                <div className="flex flex-col gap-2.5 xl:flex-row xl:items-center xl:justify-between xl:gap-4">
                  <div className="flex items-center gap-4">
                  <div className="flex h-9 w-9 items-center justify-center rounded-md border border-ep-gold/40 bg-white/5">
                    <BarChart3Icon size={20} className="text-ep-gold" />
                  </div>
                    <div className="leading-tight">
                      <div className="font-serif text-xl font-semibold tracking-[0.18em] text-white md:text-2xl">
                        {activeMode === "MMA" ? "MASS\u00a0AFFLUENT" : "ERSTE\u00a0PREMIER"}
                      </div>
                      <div className="mt-1 flex items-center gap-2">
                        <div className="text-[11px] uppercase tracking-[0.32em] text-ep-gold/90 md:text-xs">
                          Není investice jako investice
                        </div>
                      </div>
                    </div>
                  </div>
                  <div className="flex flex-col gap-2 lg:flex-row lg:flex-wrap lg:items-center lg:justify-end lg:flex-1">

                    <label className="group flex items-center gap-2 rounded-xl border border-white/15 bg-white/5 px-3 py-1.5 backdrop-blur transition focus-within:border-ep-gold/70 focus-within:bg-white/10 lg:w-[420px]">
                    <CoinsIcon size={16} className="text-ep-gold shrink-0" />
                    <span className="hidden whitespace-nowrap text-[10px] uppercase tracking-[0.18em] text-white/60 md:inline">
                      Jednorázová investice
                    </span>
                    <input
                      type="text"
                      inputMode="numeric"
                      aria-label="Jednorázová investice"
                      value={initialInvestment.toLocaleString(currency === "CZK" ? "cs-CZ" : currency === "EUR" ? "de-DE" : "en-US")}
                      onFocus={(e) => e.target.select()}
                      onChange={(e) => {
                        const parsed = normalizeNumericInput(e.target.value);
                        if (!Number.isFinite(parsed)) return;
                        setInitialInvestment(Math.max(0, parsed));
                      }}
                      className="min-w-0 w-full bg-transparent text-right text-[13px] font-semibold text-white outline-none placeholder:text-white/40 pr-1"
                    />
                    <div className="flex items-center gap-1.5 shrink-0">
                      <span className="text-[11px] font-semibold tracking-wider text-ep-gold/90">{currency}</span>
                      <span className="flex items-center gap-1">
                        <button
                          type="button"
                          onClick={() => setInitialInvestment(Math.max(0, initialInvestment - minStep))}
                          className="inline-flex h-5 w-5 items-center justify-center rounded-md border border-white/15 text-[11px] leading-none text-white/70 transition hover:bg-white/10 hover:text-white"
                          aria-label="Snížit počáteční investici"
                        >
                          −
                        </button>
                        <button
                          type="button"
                          onClick={() => setInitialInvestment(initialInvestment + minStep)}
                          className="inline-flex h-5 w-5 items-center justify-center rounded-md border border-white/15 text-[11px] leading-none text-white/70 transition hover:bg-white/10 hover:text-white"
                          aria-label="Zvýšit počáteční investici"
                        >
                          +
                        </button>
                      </span>
                    </div>
                  </label>

                    <label className="group flex items-center gap-2 rounded-xl border border-white/15 bg-white/5 px-3 py-1.5 backdrop-blur transition focus-within:border-ep-gold/70 focus-within:bg-white/10 lg:w-[420px]">
                    <CoinsIcon size={16} className="text-ep-gold shrink-0" />
                    <span className="hidden whitespace-nowrap text-[10px] uppercase tracking-[0.18em] text-white/60 md:inline">
                      Pravidelná investice
                    </span>
                    <input
                      type="text"
                      inputMode="numeric"
                      aria-label="Pravidelná investice"
                      value={monthlyContribution.toLocaleString(currency === "CZK" ? "cs-CZ" : currency === "EUR" ? "de-DE" : "en-US")}
                      onFocus={(e) => e.target.select()}
                      onChange={(e) => {
                        const parsed = normalizeNumericInput(e.target.value);
                        if (!Number.isFinite(parsed)) return;
                        setMonthlyContribution(Math.max(0, parsed));
                      }}
                      className="min-w-0 w-full bg-transparent text-right text-[13px] font-semibold text-white outline-none placeholder:text-white/40 pr-1"
                    />
                    <div className="flex items-center gap-1.5 shrink-0">
                      <span className="text-[11px] font-semibold tracking-wider text-ep-gold/90">{currency}</span>
                      <span className="flex items-center gap-1">
                        <button
                          type="button"
                          onClick={() => setMonthlyContribution(Math.max(0, monthlyContribution - monthlyStep))}
                          className="inline-flex h-5 w-5 items-center justify-center rounded-md border border-white/15 text-[11px] leading-none text-white/70 transition hover:bg-white/10 hover:text-white"
                          aria-label="Snížit pravidelnou investici"
                        >
                          −
                        </button>
                        <button
                          type="button"
                          onClick={() => setMonthlyContribution(monthlyContribution + monthlyStep)}
                          className="inline-flex h-5 w-5 items-center justify-center rounded-md border border-white/15 text-[11px] leading-none text-white/70 transition hover:bg-white/10 hover:text-white"
                          aria-label="Zvýšit pravidelnou investici"
                        >
                          +
                        </button>
                      </span>
                    </div>
                  </label>

                    <div className="flex shrink-0 items-center gap-2 lg:self-center">
                      <div className="inline-flex items-center rounded-full border border-white/15 bg-white/5 p-1 backdrop-blur" role="tablist" aria-label="Volba měny" style={{ minWidth: "90px" }}>
                      {currencyOptions.map((c) => {
                        const active = currency === c;
                        return (
                          <button key={c} type="button" role="tab" aria-selected={active} onClick={() => { setCurrency(c); setSelectedFunds([]); setCategory("Vše"); setSubCategory("Všechny podtřídy"); }}
                            className={"rounded-full px-4 py-1.5 text-xs font-semibold tracking-wider transition-all " + (active ? "bg-ep-gold text-ep-navy shadow-md" : "text-white/70 hover:text-white")}>
                            {c}
                          </button>
                        );
                      })}
                      </div>
                      <ModeToggle activeMode={activeMode} setActiveMode={setActiveMode} />
                    </div>
                  </div>
                </div>
              </div>
            </header>

            <main className="mx-auto w-full max-w-[1400px] px-4 py-8 md:px-10 md:py-10">
              {/* Hero */}
              <section className="mb-8">
                <div className="relative overflow-hidden rounded-2xl border border-slate-200 bg-ep-gradient p-6 text-white shadow-premium md:p-10">
                  <div className="absolute inset-0 bg-ep-radial" />
                  <div className="relative">
                    <SectionSwitchBar activeScreen="neni-investice" onNavigate={onNavigate} />
                  </div>
                </div>
              </section>

              <div className="flex flex-col gap-6">
                {/* Filters + Table */}
                <section className="order-2 rounded-2xl border border-slate-200 bg-white shadow-premium">
                  <div className="border-b border-slate-200 p-5 md:p-6">
                    <div className="flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
                      <div className="flex flex-wrap gap-2">
                        {categories.map((cat) => (
                          <button key={cat} type="button" onClick={() => { setCategory(cat); setSubCategory("Všechny podtřídy"); }}
                            className={"rounded-full px-3 py-1.5 text-xs font-semibold transition-all " +
                              (category === cat
                                ? "bg-ep-navy text-white shadow-sm"
                                : "border border-slate-200 bg-white text-slate-600 hover:border-ep-blue/30 hover:bg-slate-50")
                            }
                            style={category === cat && NENI_CATEGORY_COLORS[cat] ? { backgroundColor: NENI_CATEGORY_COLORS[cat] } : undefined}
                          >
                            {cat === "Vše" ? cat : getDisplayedMainCategoryLabel(cat, activeMode)}
                          </button>
                        ))}
                      </div>
                      <div className="flex w-full flex-col gap-2 lg:w-[520px] lg:flex-row">
                        <input
                          type="text"
                          value={search}
                          onChange={(e) => setSearch(e.target.value)}
                          placeholder="Hledat fond nebo ISIN…"
                          className="w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-2 text-sm text-slate-700 outline-none focus:border-ep-blue focus:ring-2 focus:ring-ep-blue/20 lg:flex-1"
                          aria-label="Hledat fond nebo ISIN"
                        />
                        <select
                          value={sleeveFilter}
                          onChange={(e) => setSleeveFilter(e.target.value)}
                          className="w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-2 text-sm text-slate-700 outline-none focus:border-ep-blue focus:ring-2 focus:ring-ep-blue/20 lg:w-56"
                          aria-label="Filtrovat podle složky"
                        >
                          {sleeveOptions.map((option) => (
                            <option key={option} value={option}>{option}</option>
                          ))}
                        </select>
                      </div>
                    </div>
                    {/* Subcategory filter row */}
                    {subCategories.length > 1 && activeMode !== "MMA" && (
                      <div className="mt-2 flex flex-wrap gap-1.5">
                        {subCategories.map((sub) => (
                          <button key={sub} type="button" onClick={() => setSubCategory(sub)}
                            className={"rounded-full px-2.5 py-1 text-[11px] font-medium transition-all " +
                              (subCategory === sub
                                ? "bg-ep-navy/80 text-white shadow-sm"
                                : "border border-slate-200 bg-slate-50 text-slate-500 hover:border-ep-blue/20 hover:bg-slate-100")
                            }
                          >
                            {sub}
                          </button>
                        ))}
                      </div>
                    )}
                    {selectedFunds.length > 0 && (
                      <div className="mt-3 flex flex-wrap items-center gap-2">
                        <span className="text-[11px] font-semibold uppercase tracking-widest text-slate-500">Vybrané pro srovnání:</span>
                        {selectedFunds.map((fundId) => {
                          const selectedFund = allFunds.find((f) => f.id === fundId);
                          const label = selectedFund?.name || fundId;
                          return (
                            <span key={fundId} className="inline-flex items-center gap-1.5 rounded-full border border-ep-blue/30 bg-ep-blue/5 px-2.5 py-1 text-[11px] font-semibold text-ep-blue">
                              {label}
                              <button type="button" onClick={() => toggleFund(fundId)} className="text-ep-blue/60 hover:text-ep-blue" aria-label={`Odebrat ${label}`}>×</button>
                            </span>
                          );
                        })}
                        <button type="button" onClick={() => setSelectedFunds([])} className="text-[11px] text-slate-500 hover:text-rose-600 underline">Zrušit výběr</button>
                      </div>
                    )}
                  </div>

                  {/* Table */}
                  <div className="max-h-[540px] overflow-auto">
                    <table className="w-full min-w-[600px] border-collapse text-sm">
                      <thead className="sticky top-0 z-10">
                        <tr className="border-b border-slate-200 bg-slate-50">
                          <th className="w-8 px-3 py-2.5 text-left"></th>
                          <th className="px-4 py-2.5 text-left text-[11px] font-semibold uppercase tracking-widest text-slate-500">Fond</th>
                          <th className="px-4 py-2.5 text-left text-[11px] font-semibold uppercase tracking-widest text-slate-500">Kategorie</th>
                          <th className="px-4 py-2.5 text-right text-[11px] font-semibold uppercase tracking-widest text-slate-500">1 rok p.a.</th>
                          <th className="px-4 py-2.5 text-right text-[11px] font-semibold uppercase tracking-widest text-slate-500">3 roky p.a.</th>
                          <th className="px-4 py-2.5 text-right text-[11px] font-semibold uppercase tracking-widest text-slate-500">5 let p.a.</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-100">
                        {filtered.map((fund) => {
                          const selected = selectedFunds.includes(fund.id);
                          const colorIdx = selectedFunds.indexOf(fund.id);
                          const dotColor = colorIdx >= 0 ? NENI_FUND_COLORS[colorIdx % NENI_FUND_COLORS.length] : NENI_CATEGORY_COLORS[fund.mainCategory] || "#1e5fb8";
                          return (
                            <tr
                              key={fund.id}
                              onClick={() => toggleFund(fund.id)}
                              className={"cursor-pointer transition-colors " + (selected ? "bg-ep-blue/5 hover:bg-ep-blue/8" : "hover:bg-slate-50")}
                            >
                              <td className="px-3 py-2.5 text-center">
                                <span className={
                                  "inline-flex h-4 w-4 items-center justify-center rounded-full border-2 transition-all " +
                                  (selected ? "border-ep-blue bg-ep-blue" : "border-slate-300 bg-white")
                                }
                                style={selected ? { backgroundColor: dotColor, borderColor: dotColor } : undefined}
                                >
                                  {selected && <span className="text-white text-[8px] font-bold">✓</span>}
                                </span>
                              </td>
                              <td className="px-4 py-2.5">
                                <div className="flex items-center gap-2">
                                  {selected && <span className="h-2.5 w-2.5 rounded-full shrink-0" style={{ backgroundColor: dotColor }} />}
                                  <div className="min-w-0">
                                    <div className={"text-xs font-semibold " + (selected ? "text-ep-navy" : "text-slate-700")}>{fund.name}</div>
                                    <div className="mt-0.5 text-[10px] text-slate-500">{[fund.currency, fund.sleeve, fund.isin ? `ISIN ${fund.isin}` : "ISIN doplníme"].filter(Boolean).join(" · ")}</div>
                                  </div>
                                </div>
                              </td>
                              <td className="px-4 py-2.5">
                                <span className="inline-flex items-center rounded-full px-2 py-0.5 text-[10px] font-semibold"
                                  style={{ background: (NENI_CATEGORY_COLORS[fund.mainCategory] || "#64748b") + "18", color: NENI_CATEGORY_COLORS[fund.mainCategory] || "#64748b" }}>
                                 {getDisplayedMainCategoryLabel(fund.mainCategory, activeMode)}
                                </span>
                               {fund.subCategory && activeMode !== "MMA" && (
                                 <span className="ml-1 inline-flex items-center rounded-full border border-slate-200 bg-slate-50 px-2 py-0.5 text-[10px] text-slate-500">
                                   {fund.subCategory}
                                 </span>
                               )}
                              </td>
                              <td className="px-4 py-2.5 text-right">{fmtPct(fund.p1y)}</td>
                              <td className="px-4 py-2.5 text-right">{fmtPct(fund.p3y)}</td>
                              <td className="px-4 py-2.5 text-right">{fmtPct(fund.p5y)}</td>
                            </tr>
                          );
                        })}
                        {!filtered.length && (
                          <tr><td colSpan={6} className="px-4 py-8 text-center text-sm text-slate-500">Žádné fondy neodpovídají filtru.</td></tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                  <div className="border-t border-slate-100 px-5 py-3 text-[11px] text-slate-400">
                    Kliknutím na fond ho přidáte do srovnání (max. 8). Výkonnost p.a. = průměrný roční výnos za dané období.
                  </div>
                </section>

                {/* Comparison charts */}
                {compFunds.length > 0 && (
                  <section className="order-1 rounded-2xl border border-slate-200 bg-white p-5 shadow-premium fade-in md:p-7">
                    <div className="mb-5 flex flex-col gap-3 md:flex-row md:items-start md:justify-between">
                      <div>
                        <h3 className="text-lg font-semibold ep-text-navy">Srovnání vybraných fondů</h3>
                        <p className="text-sm text-slate-500">
                          Simulovaný vývoj investovaných finančních prostředků na základě historické výkonnosti.
                        </p>
                      </div>
                      <div className="inline-flex items-center rounded-full border border-slate-200 bg-slate-50 p-1 shrink-0" role="tablist" aria-label="Typ zobrazení grafu">
                        {[{ id: "value", label: `Hodnota ${currency}` }, { id: "percent", label: "Výkonnost %" }].map((opt) => (
                          <button key={opt.id} type="button" role="tab" aria-selected={viewMode === opt.id}
                            onClick={() => setViewMode(opt.id)}
                            className={"rounded-full px-4 py-1.5 text-xs font-semibold tracking-wide transition-all " +
                              (viewMode === opt.id ? "bg-ep-navy text-white shadow-sm" : "text-slate-600 hover:text-slate-900")}>
                            {opt.label}
                          </button>
                        ))}
                      </div>
                    </div>

                    <div className="mb-4 grid gap-3 md:grid-cols-2 xl:grid-cols-4">
                      {compFunds.map((f, idx) => {
                        const valueKey = viewMode === "percent" ? `${f.id}Pct` : f.id;
                        const finalValue = finalRow ? finalRow[valueKey] : null;
                        return (
                          <div key={f.id} className="rounded-xl border border-slate-200 bg-slate-50 px-4 py-3">
                            <div className="flex items-center gap-2 text-[11px] font-semibold uppercase tracking-widest text-slate-500">
                              <span className="h-2.5 w-2.5 rounded-full" style={{ backgroundColor: NENI_FUND_COLORS[idx % NENI_FUND_COLORS.length] }} />
                              <span className="truncate">{f.name}</span>
                            </div>
                            <div className="mt-0.5 text-[10px] text-slate-500">{f.isin ? `ISIN ${f.isin}` : "ISIN doplníme"}</div>
                            <div className="mt-1 text-base font-semibold ep-text-navy">
                              {finalValue === null || finalValue === undefined
                                ? "–"
                                : viewMode === "percent"
                                ? `${finalValue >= 0 ? "+" : ""}${Number(finalValue).toFixed(2)} %`
                                : formatMoney(finalValue)}
                            </div>
                            <div className="text-[10px] uppercase tracking-widest text-slate-400">{chartLabelValue}</div>
                          </div>
                        );
                      })}
                    </div>

                    {/* Legend */}
                    <div className="mb-4 flex flex-wrap gap-2">
                      {compFunds.map((f, idx) => (
                        <button
                          key={f.id}
                          type="button"
                          onClick={() => toggleFund(f.id)}
                          className="inline-flex items-center gap-2 rounded-full border border-slate-200 bg-slate-50 px-3 py-1.5 text-xs text-slate-700 transition hover:border-rose-200 hover:bg-rose-50 hover:text-rose-700"
                          aria-label={`Odebrat ${f.name} z porovnání`}
                          title="Odebrat fond z porovnání"
                        >
                          <span className="h-2.5 w-2.5 rounded-full" style={{ backgroundColor: NENI_FUND_COLORS[idx % NENI_FUND_COLORS.length] }} />
                          <span className="font-medium">{f.name}</span>
                          <span className="text-slate-400">×</span>
                        </button>
                      ))}
                    </div>

                    <div className="mb-3 flex flex-col gap-2">
                      <div className="flex items-center justify-between gap-3">
                        <div className="text-[10px] font-semibold uppercase tracking-[0.28em] text-slate-500">Horizont</div>
                        <div className="inline-flex flex-wrap items-center rounded-full border border-slate-200 bg-slate-50 p-1" role="group" aria-label="Výběr horizontu grafu">
                          {HORIZON_OPTIONS.map((opt) => {
                            const active = horizonMonths === opt.months;
                            return (
                              <button
                                key={opt.label}
                                type="button"
                                title={opt.title}
                                onClick={() => {
                                  setHorizonMonths(opt.months);
                                  if (opt.months === "custom") {
                                    if (!customDateFrom) setCustomDateFrom(TIMELINE_MIN);
                                    if (!customDateTo) setCustomDateTo(TIMELINE_MAX);
                                  }
                                }}
                                aria-pressed={active}
                                className={"rounded-full px-3 py-1.5 text-xs font-semibold tracking-wide transition-all " + (active ? "bg-ep-navy text-white shadow-sm" : "text-slate-600 hover:text-slate-900")}
                              >
                                {opt.label}
                              </button>
                            );
                          })}
                        </div>
                      </div>
                      {horizonMonths === "custom" && (
                        <div className="flex flex-wrap items-center gap-3 rounded-xl border border-slate-200 bg-slate-50 px-4 py-3">
                          <label className="flex items-center gap-2 text-xs font-semibold text-slate-600">
                            Od
                            <input
                              type="month"
                              value={customDateFrom}
                              min={TIMELINE_MIN}
                              max={customDateTo || TIMELINE_MAX}
                              onChange={(e) => setCustomDateFrom(e.target.value)}
                              className="rounded-lg border border-slate-300 bg-white px-2 py-1 text-xs font-medium text-slate-800 focus:border-ep-blue focus:outline-none focus:ring-1 focus:ring-ep-blue/30"
                            />
                          </label>
                          <label className="flex items-center gap-2 text-xs font-semibold text-slate-600">
                            Do
                            <input
                              type="month"
                              value={customDateTo}
                              min={customDateFrom || TIMELINE_MIN}
                              max={TIMELINE_MAX}
                              onChange={(e) => setCustomDateTo(e.target.value)}
                              className="rounded-lg border border-slate-300 bg-white px-2 py-1 text-xs font-medium text-slate-800 focus:border-ep-blue focus:outline-none focus:ring-1 focus:ring-ep-blue/30"
                            />
                          </label>
                        </div>
                      )}
                    </div>

                    <div className="h-[340px] w-full md:h-[400px]">
                      <ResponsiveContainer width="100%" height="100%">
                        <AreaChart data={displayData} margin={{ top: 8, right: 16, left: 0, bottom: 0 }}>
                          <CartesianGrid stroke="rgba(148,163,184,0.18)" vertical={false} />
                          <XAxis dataKey="date" ticks={xTicks} tick={{ fontSize: 11, fill: "#64748b" }} tickLine={false} axisLine={{ stroke: "rgba(148,163,184,0.3)" }} />
                          <YAxis
                            domain={neniYAxis.domain}
                            ticks={neniYAxis.ticks}
                            tickFormatter={(v) => formatAxisValue(v, currency, viewMode, neniYAxis.tickStep, neniYAxis.visibleLabelTicks)}
                            tick={{ fontSize: 11, fill: "#64748b" }}
                            tickLine={false}
                            axisLine={{ stroke: "rgba(148,163,184,0.3)" }}
                            width={84}
                          />
                          <Tooltip
                            formatter={(v, name) =>
                              v !== null
                                ? [
                                    viewMode === "percent"
                                      ? `${Number(v).toFixed(2)} %`
                                      : formatMoney(v),
                                    name,
                                  ]
                                : ["–", name]
                            }
                            labelStyle={{ fontWeight: 600, color: "#0a1e3f", marginBottom: 4 }}
                            contentStyle={{ borderRadius: 12, border: "1px solid #e2e8f0", fontSize: 12 }}
                          />
                          <Legend verticalAlign="top" height={32} iconType="circle" wrapperStyle={{ fontSize: 12, color: "#475569" }} />
                          <ReferenceLine y={referenceValue} ifOverflow="extendDomain" stroke="#94a3b8" strokeDasharray="4 3" strokeWidth={1} />
                          {compFunds.map((f, idx) => (
                            <Area
                              key={f.id}
                              type="linear"
                              dataKey={viewMode === "percent" ? `${f.id}Pct` : f.id}
                              name={f.name}
                              stroke={NENI_FUND_COLORS[idx % NENI_FUND_COLORS.length]}
                              strokeWidth={2.8}
                              fill="transparent"
                              activeDot={{ r: 4 }}
                              connectNulls={false}
                              isAnimationActive={false}
                            />
                          ))}
                        </AreaChart>
                      </ResponsiveContainer>
                    </div>

                    {/* Summary stats for selected funds */}
                    <div className="mt-5 overflow-x-auto">
                      <table className="w-full min-w-[560px] border-collapse text-sm">
                        <thead>
                          <tr className="border-b border-slate-200">
                            <th className="px-3 py-2 text-left text-[10px] font-semibold uppercase tracking-widest text-slate-500">Fond</th>
                            <th className="px-3 py-2 text-right text-[10px] font-semibold uppercase tracking-widest text-slate-500">1 rok p.a.</th>
                            <th className="px-3 py-2 text-right text-[10px] font-semibold uppercase tracking-widest text-slate-500">3 roky p.a.</th>
                            <th className="px-3 py-2 text-right text-[10px] font-semibold uppercase tracking-widest text-slate-500">5 let p.a.</th>
                            <th className="px-3 py-2 text-right text-[10px] font-semibold uppercase tracking-widest text-slate-500">Kumulativně 5 let</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100">
                          {compFunds.map((f, idx) => {
                            const cum5 = f.p5y !== null ? (Math.pow(1 + f.p5y / 100, 5) - 1) * 100 : null;
                            return (
                              <tr key={f.id}>
                                <td className="flex items-center gap-2 px-3 py-2">
                                  <span className="h-2.5 w-2.5 rounded-full shrink-0 self-start mt-1" style={{ backgroundColor: NENI_FUND_COLORS[idx % NENI_FUND_COLORS.length] }} />
                                  <div>
                                    <div className="text-xs font-semibold text-slate-700">{f.name}</div>
                                    <div className="mt-0.5 text-[10px] text-slate-500">{f.isin ? `ISIN ${f.isin}` : "ISIN doplníme"}</div>
                                  </div>
                                </td>
                                <td className="px-3 py-2 text-right">{fmtPct(f.p1y)}</td>
                                <td className="px-3 py-2 text-right">{fmtPct(f.p3y)}</td>
                                <td className="px-3 py-2 text-right">{fmtPct(f.p5y)}</td>
                                <td className="px-3 py-2 text-right">{fmtPct(cum5 !== null ? +cum5.toFixed(2) : null)}</td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </section>
                )}
              </div>

              <footer className="mt-10 border-t border-slate-200 pt-6 text-center text-xs text-slate-500">
                © {new Date().getFullYear()} Erste Premier — Demo · Výkonnosti vycházejí z historických dat. Nejedná se o investiční doporučení.
              </footer>
            </main>
          </div>
        );
      }

      function App() {
        const [screen, setScreen] = useState("zpetna-modelace");
        const [activeMode, setActiveMode] = useState("EP");

        useEffect(() => {
          const loader = document.getElementById("boot-loader");
          if (loader) {
            loader.style.opacity = "0";
            setTimeout(() => loader.remove(), 400);
          }
        }, []);

        return (
          <InvestmentProvider>
            {screen === "neni-investice" ? (
              <NeniInvesticeApp onNavigate={setScreen} activeMode={activeMode} setActiveMode={setActiveMode} />
            ) : (
              <Index onNavigate={setScreen} activeMode={activeMode} setActiveMode={setActiveMode} />
            )}
          </InvestmentProvider>
        );
      }

      /* ------------------------------------------------------------------ */
      /*  Mount                                                              */
      /* ------------------------------------------------------------------ */
      const rootEl = document.getElementById("root");
      ReactDOM.createRoot(rootEl).render(<App />);

    </script>
  </body>
</html>
