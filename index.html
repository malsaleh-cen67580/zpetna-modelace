                    <table className="w-full min-w-[600px] border-collapse text-sm">
                      <thead>
                        <tr className="border-b border-slate-200 bg-slate-50">
                          <th className="w-8 px-3 py-2.5 text-left"></th>
                          <th className="px-4 py-2.5 text-left text-[11px] font-semibold uppercase tracking-widest text-slate-500">Fond</th>
                          <th className="px-4 py-2.5 text-left text-[11px] font-semibold uppercase tracking-widest text-slate-500">Kategorie</th>
                          <th className="cursor-pointer px-4 py-2.5 text-right text-[11px] font-semibold uppercase tracking-widest text-slate-500 hover:text-slate-800 select-none" onClick={() => toggleSort("p1y")}>
                            1 rok p.a. <SortArrow k="p1y" />
                          </th>
                          <th className="cursor-pointer px-4 py-2.5 text-right text-[11px] font-semibold uppercase tracking-widest text-slate-500 hover:text-slate-800 select-none" onClick={() => toggleSort("p3y")}>
                            3 roky p.a. <SortArrow k="p3y" />
                          </th>
                          <th className="cursor-pointer px-4 py-2.5 text-right text-[11px] font-semibold uppercase tracking-widest text-slate-500 hover:text-slate-800 select-none" onClick={() => toggleSort("p5y")}>
                            5 let p.a. <SortArrow k="p5y" />
                          </th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-100">
                        {filtered.map((fund) => {
                          const selected = selectedFunds.includes(fund.name);
                          const colorIdx = selectedFunds.indexOf(fund.name);
                          const dotColor = colorIdx >= 0 ? NENI_FUND_COLORS[colorIdx % NENI_FUND_COLORS.length] : NENI_CATEGORY_COLORS[fund.category] || "#1e5fb8";
                          return (
                            <tr
                              key={fund.name}
                              onClick={() => toggleFund(fund.name)}
                              className={"cursor-pointer transition-colors " + (selected ? "bg-ep-blue/5 hover:bg-ep-blue/8" : "hover:bg-slate-50")}
                            >
                              <td className="px-3 py-2.5 text-center">
                                <span className={
                                  "inline-flex h-4 w-4 items-center justify-center rounded-full border-2 transition-all " +
                                  (selected ? "border-ep-blue bg-ep-blue" : "border-slate-300 bg-white")
                                }
                                style={selected ? { backgroundColor: dotColor, borderColor: dotColor } : undefined}
                                >
                                  {selected && <span className="text-white text-[8px] font-bold">✓</span>}
                                </span>
                              </td>
                              <td className="px-4 py-2.5">
                                <div className="flex items-center gap-2">
                                  {selected && <span className="h-2.5 w-2.5 rounded-full shrink-0" style={{ backgroundColor: dotColor }} />}
                                  <div className="min-w-0">
                                    <div className={"text-xs font-semibold " + (selected ? "text-ep-navy" : "text-slate-700")}>{fund.name}</div>
                                    <div className="mt-0.5 text-[10px] text-slate-500">{fund.isin ? `ISIN ${fund.isin}` : "ISIN doplníme"}</div>
                                  </div>
                                </div>
                              </td>
                              <td className="px-4 py-2.5">
                                <span className="inline-flex items-center rounded-full px-2 py-0.5 text-[10px] font-semibold"
                                  style={{ background: (NENI_CATEGORY_COLORS[fund.category] || "#64748b") + "18", color: NENI_CATEGORY_COLORS[fund.category] || "#64748b" }}>
                                  {fund.category}
                                </span>
                              </td>
                              <td className="px-4 py-2.5 text-right">{fmtPct(fund.p1y)}</td>
                              <td className="px-4 py-2.5 text-right">{fmtPct(fund.p3y)}</td>
                              <td className="px-4 py-2.5 text-right">{fmtPct(fund.p5y)}</td>
                            </tr>
                          );
                        })}
                        {!filtered.length && (
                          <tr><td colSpan={6} className="px-4 py-8 text-center text-sm text-slate-500">Žádné fondy neodpovídají filtru.</td></tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                  <div className="border-t border-slate-100 px-5 py-3 text-[11px] text-slate-400">
                    Kliknutím na fond ho přidáte do srovnání (max. 8). Výkonnost p.a. = průměrný roční výnos za dané období.
                  </div>
                </section>

                {/* Comparison charts */}
                {compFunds.length > 0 && (
                  <section className="order-1 rounded-2xl border border-slate-200 bg-white p-5 shadow-premium fade-in md:p-7">
                    <div className="mb-5 flex flex-col gap-3 md:flex-row md:items-start md:justify-between">
                      <div>
                        <h3 className="text-lg font-semibold ep-text-navy">Srovnání vybraných fondů</h3>
                        <p className="text-sm text-slate-500">
                          Simulovaný vývoj investovaných finančních prostředků na základě historické výkonnosti.
                        </p>
                      </div>
                      <div className="inline-flex items-center rounded-full border border-slate-200 bg-slate-50 p-1 shrink-0" role="tablist" aria-label="Typ zobrazení grafu">
                        {[{ id: "value", label: `Hodnota ${currency}` }, { id: "percent", label: "Výkonnost %" }].map((opt) => (
                          <button key={opt.id} type="button" role="tab" aria-selected={viewMode === opt.id}
                            onClick={() => setViewMode(opt.id)}
                            className={"rounded-full px-4 py-1.5 text-xs font-semibold tracking-wide transition-all " +
                              (viewMode === opt.id ? "bg-ep-navy text-white shadow-sm" : "text-slate-600 hover:text-slate-900")}>
                            {opt.label}
                          </button>
                        ))}
                      </div>
                    </div>

                    <div className="mb-4 grid gap-3 md:grid-cols-2 xl:grid-cols-4">
                      {compFunds.map((f, idx) => {
                        const valueKey = viewMode === "percent" ? `${f.name}Pct` : f.name;
                        const finalValue = finalRow ? finalRow[valueKey] : null;
                        return (
                          <div key={f.name} className="rounded-xl border border-slate-200 bg-slate-50 px-4 py-3">
                            <div className="flex items-center gap-2 text-[11px] font-semibold uppercase tracking-widest text-slate-500">
                              <span className="h-2.5 w-2.5 rounded-full" style={{ backgroundColor: NENI_FUND_COLORS[idx % NENI_FUND_COLORS.length] }} />
                              <span className="truncate">{f.name}</span>
                            </div>
                            <div className="mt-0.5 text-[10px] text-slate-500">{f.isin ? `ISIN ${f.isin}` : "ISIN doplníme"}</div>
                            <div className="mt-1 text-base font-semibold ep-text-navy">
                              {finalValue === null || finalValue === undefined
                                ? "–"
                                : viewMode === "percent"
                                ? `${finalValue >= 0 ? "+" : ""}${Number(finalValue).toFixed(2)} %`
                                : formatMoney(finalValue)}
                            </div>
                            <div className="text-[10px] uppercase tracking-widest text-slate-400">{chartLabelValue}</div>
                          </div>
                        );
                      })}
                    </div>

                    {/* Legend */}
                    <div className="mb-4 flex flex-wrap gap-3">
                      {compFunds.map((f, idx) => (
                        <div key={f.name} className="flex items-center gap-1.5 text-xs text-slate-700">
                          <span className="h-2.5 w-2.5 rounded-full" style={{ backgroundColor: NENI_FUND_COLORS[idx % NENI_FUND_COLORS.length] }} />
                          <span className="font-medium">{f.name}</span>
                        </div>
                      ))}
                    </div>

                    <div className="mb-3 flex flex-col gap-2">
                      <div className="flex items-center justify-between gap-3">
                        <div className="text-[10px] font-semibold uppercase tracking-[0.28em] text-slate-500">Horizont</div>
                        <div className="inline-flex flex-wrap items-center rounded-full border border-slate-200 bg-slate-50 p-1" role="group" aria-label="Výběr horizontu grafu">
                          {HORIZON_OPTIONS.map((opt) => {
                            const active = horizonMonths === opt.months;
                            return (
                              <button
                                key={opt.label}
                                type="button"
                                title={opt.title}
                                onClick={() => {
                                  setHorizonMonths(opt.months);
                                  if (opt.months === "custom") {
                                    if (!customDateFrom) setCustomDateFrom(TIMELINE_MIN);
                                    if (!customDateTo) setCustomDateTo(TIMELINE_MAX);
                                  }
                                }}
                                aria-pressed={active}
                                className={"rounded-full px-3 py-1.5 text-xs font-semibold tracking-wide transition-all " + (active ? "bg-ep-navy text-white shadow-sm" : "text-slate-600 hover:text-slate-900")}
                              >
                                {opt.label}
                              </button>
                            );
                          })}
                        </div>
                      </div>
                      {horizonMonths === "custom" && (
                        <div className="flex flex-wrap items-center gap-3 rounded-xl border border-slate-200 bg-slate-50 px-4 py-3">
                          <label className="flex items-center gap-2 text-xs font-semibold text-slate-600">
                            Od
                            <input
                              type="month"
                              value={customDateFrom}
                              min={TIMELINE_MIN}
                              max={customDateTo || TIMELINE_MAX}
                              onChange={(e) => setCustomDateFrom(e.target.value)}
                              className="rounded-lg border border-slate-300 bg-white px-2 py-1 text-xs font-medium text-slate-800 focus:border-ep-blue focus:outline-none focus:ring-1 focus:ring-ep-blue/30"
                            />
                          </label>
                          <label className="flex items-center gap-2 text-xs font-semibold text-slate-600">
                            Do
                            <input
                              type="month"
                              value={customDateTo}
                              min={customDateFrom || TIMELINE_MIN}
                              max={TIMELINE_MAX}
                              onChange={(e) => setCustomDateTo(e.target.value)}
                              className="rounded-lg border border-slate-300 bg-white px-2 py-1 text-xs font-medium text-slate-800 focus:border-ep-blue focus:outline-none focus:ring-1 focus:ring-ep-blue/30"
                            />
                          </label>
                        </div>
                      )}
                    </div>

                    <div className="h-[340px] w-full md:h-[400px]">
                      <ResponsiveContainer width="100%" height="100%">
                        <AreaChart data={displayData} margin={{ top: 8, right: 16, left: 0, bottom: 0 }}>
                          <CartesianGrid stroke="rgba(148,163,184,0.18)" vertical={false} />
                          <XAxis dataKey="date" ticks={xTicks} tick={{ fontSize: 11, fill: "#64748b" }} tickLine={false} axisLine={{ stroke: "rgba(148,163,184,0.3)" }} />
                          <YAxis
                            tickFormatter={(v) =>
                              viewMode === "percent"
                                ? `${Number(v).toFixed(0)} %`
                                : formatMoney(v, { compact: true }).replace(/\s/g, "")
                            }
                            tick={{ fontSize: 11, fill: "#64748b" }}
                            tickLine={false}
                            axisLine={{ stroke: "rgba(148,163,184,0.3)" }}
                            width={70}
                          />
                          <Tooltip
                            formatter={(v, name) =>
                              v !== null
                                ? [
                                    viewMode === "percent"
                                      ? `${Number(v).toFixed(2)} %`
                                      : formatMoney(v),
                                    name,
                                  ]
                                : ["–", name]
                            }
                            labelStyle={{ fontWeight: 600, color: "#0a1e3f", marginBottom: 4 }}
                            contentStyle={{ borderRadius: 12, border: "1px solid #e2e8f0", fontSize: 12 }}
                          />
                          <Legend verticalAlign="top" height={32} iconType="circle" wrapperStyle={{ fontSize: 12, color: "#475569" }} />
                          <ReferenceLine y={viewMode === "percent" ? 0 : initialInvestment} stroke="#94a3b8" strokeDasharray="4 3" strokeWidth={1} />
                          {compFunds.map((f, idx) => (
                            <Area
                              key={f.name}
                              type="monotone"
                              dataKey={viewMode === "percent" ? `${f.name}Pct` : f.name}
                              name={f.name}
                              stroke={NENI_FUND_COLORS[idx % NENI_FUND_COLORS.length]}
                              strokeWidth={2.8}
                              fill="transparent"
                              activeDot={{ r: 4 }}
                              connectNulls={false}
                              isAnimationActive={false}
                            />
                          ))}
                        </AreaChart>
                      </ResponsiveContainer>
                    </div>

                    {/* Summary stats for selected funds */}
                    <div className="mt-5 overflow-x-auto">
                      <table className="w-full min-w-[560px] border-collapse text-sm">
                        <thead>
                          <tr className="border-b border-slate-200">
                            <th className="px-3 py-2 text-left text-[10px] font-semibold uppercase tracking-widest text-slate-500">Fond</th>
                            <th className="px-3 py-2 text-right text-[10px] font-semibold uppercase tracking-widest text-slate-500">1 rok p.a.</th>
                            <th className="px-3 py-2 text-right text-[10px] font-semibold uppercase tracking-widest text-slate-500">3 roky p.a.</th>
                            <th className="px-3 py-2 text-right text-[10px] font-semibold uppercase tracking-widest text-slate-500">5 let p.a.</th>
                            <th className="px-3 py-2 text-right text-[10px] font-semibold uppercase tracking-widest text-slate-500">Kumulativně 5 let</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100">
                          {compFunds.map((f, idx) => {
                            const cum5 = f.p5y !== null ? (Math.pow(1 + f.p5y / 100, 5) - 1) * 100 : null;
                            return (
                              <tr key={f.name}>
                                <td className="flex items-center gap-2 px-3 py-2">
                                  <span className="h-2.5 w-2.5 rounded-full shrink-0 self-start mt-1" style={{ backgroundColor: NENI_FUND_COLORS[idx % NENI_FUND_COLORS.length] }} />
                                  <div>
                                    <div className="text-xs font-semibold text-slate-700">{f.name}</div>
                                    <div className="mt-0.5 text-[10px] text-slate-500">{f.isin ? `ISIN ${f.isin}` : "ISIN doplníme"}</div>
                                  </div>
                                </td>
                                <td className="px-3 py-2 text-right">{fmtPct(f.p1y)}</td>
                                <td className="px-3 py-2 text-right">{fmtPct(f.p3y)}</td>
                                <td className="px-3 py-2 text-right">{fmtPct(f.p5y)}</td>
                                <td className="px-3 py-2 text-right">{fmtPct(cum5 !== null ? +cum5.toFixed(2) : null)}</td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </section>
                )}
              </div>

              <footer className="mt-10 border-t border-slate-200 pt-6 text-center text-xs text-slate-500">
                © {new Date().getFullYear()} Erste Premier — Demo · Výkonnosti vycházejí z historických dat. Nejedná se o investiční doporučení.
              </footer>
            </main>
          </div>
        );
      }

      function App() {
        const [screen, setScreen] = useState("home");

        useEffect(() => {
          const loader = document.getElementById("boot-loader");
          if (loader) {
            loader.style.opacity = "0";
            setTimeout(() => loader.remove(), 400);
          }
        }, []);

        if (screen === "home") return <HomeScreen onNavigate={setScreen} />;
        return (
          <InvestmentProvider>
            {screen === "neni-investice" ? (
              <NeniInvesticeApp onBack={() => setScreen("home")} onNavigate={setScreen} />
            ) : (
              <Index onNavigate={setScreen} />
            )}
          </InvestmentProvider>
        );
      }

      /* ------------------------------------------------------------------ */
      /*  Mount                                                              */
      /* ------------------------------------------------------------------ */
      const rootEl = document.getElementById("root");
      ReactDOM.createRoot(rootEl).render(<App />);

    </script>
  </body>
</html>
