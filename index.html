      // Returns months between inceptionDate and PERF_REFERENCE_DATE.
      // Returns 999 (effectively infinite) when no inception date is provided.
      function monthsAvailable(inceptionDate) {
        if (!inceptionDate) return 999;
        const diff =
          (PERF_REFERENCE_DATE.getFullYear() - inceptionDate.getFullYear()) * 12 +
          (PERF_REFERENCE_DATE.getMonth() - inceptionDate.getMonth());
        return Math.max(0, diff);

      // Returns adjusted {p1y, p3y, p5y} for a single fund.
      // For periods before the fund's inception, performance is counted as 0.
      // rawPerf: object from FUND_PERF_DATA or null if not available.
      // months:  months the fund has been available up to PERF_REFERENCE_DATE.
      function getAdjustedFundPerf(rawPerf, months) {
        if (!rawPerf) return { p1y: 0, p3y: 0, p5y: 0 };
        const r1 = rawPerf.p1y, r3 = rawPerf.p3y, r5 = rawPerf.p5y;

        // 1Y
        const p1y = (months >= 12 && r1 !== null) ? r1 : 0;

        // 3Y: use document value; blend or approximate when unavailable
        let p3y;
        if (r3 !== null) {
          p3y = r3;
        } else if (months >= 36 && r1 !== null) {
          p3y = r1; // old fund, only 1Y in doc – use as proxy
        } else if (months >= 12 && r1 !== null) {
          // 12–35 months: 0% for (36-12) months + 1Y for 12 months
          p3y = (Math.pow(1 + r1 / 100, 12 / 36) - 1) * 100;
        } else {
          p3y = 0;
        }

        // 5Y: use document value; blend or approximate when unavailable
        let p5y;
        if (r5 !== null) {
          p5y = r5;
        } else if (months >= 36 && r3 !== null) {
          // 36–59 months: 0% for (60-36) months + 3Y for 36 months
          p5y = (Math.pow(1 + r3 / 100, 36 / 60) - 1) * 100;
        } else if (months >= 12 && r1 !== null) {
          // 12–35 months: 0% for (60-12) months + 1Y for 12 months
          p5y = (Math.pow(1 + r1 / 100, 12 / 60) - 1) * 100;
        } else {
          p5y = 0;
        }

        return { p1y, p3y, p5y };

      // Funds with no document data and not in FUND_INCEPTION are excluded from
      // the weighted average (rather than counted as 0) to avoid distortion.
      // Young funds (in FUND_INCEPTION) are always included with 0-padded adjustment.
      function computePortfolioPerf(funds, currency) {
        if (!funds || !funds.length) {
          return { performance1y: 0, performance3y: 0, performance5y: 0 };

        let wp1y = 0, tw1y = 0;
        let wp3y = 0, tw3y = 0;
        let wp5y = 0, tw5y = 0;

        funds.forEach((fund) => {
          const w = Number(fund.weight) || 0;
          if (w <= 0) return;
          const name = (fund.name || "").trim();
          const rawPerf = (FUND_PERF_DATA[currency] || {})[name] || null;

          const isListedInception = Object.prototype.hasOwnProperty.call(FUND_INCEPTION, inceptionKey);
          const months = monthsAvailable(isListedInception ? FUND_INCEPTION[inceptionKey] : null);
          const hasAnyData = rawPerf && (rawPerf.p1y !== null || rawPerf.p3y !== null || rawPerf.p5y !== null);

          // Exclude funds with no data at all that aren't explicitly listed
          if (!hasAnyData && !isListedInception) return;

          const adj = getAdjustedFundPerf(rawPerf, months);
          wp1y += adj.p1y * w; tw1y += w;
          wp3y += adj.p3y * w; tw3y += w;
          wp5y += adj.p5y * w; tw5y += w;
        });

        return {
          performance1y: tw1y > 0 ? wp1y / tw1y : 0,
          performance3y: tw3y > 0 ? wp3y / tw3y : 0,
          performance5y: tw5y > 0 ? wp5y / tw5y : 0,

      /* ------------------------------------------------------------------ */
      /*  Portfolio math                                                     */
      /* ------------------------------------------------------------------ */
      function weightedMonthlyReturns(allocation) {
        const out = new Array(TIMELINE.length).fill(0);
        Object.keys(allocation).forEach((key) => {
          const weight = (allocation[key] || 0) / 100;
          if (weight <= 0) return;
          const series = HISTORICAL_RETURNS[key];
          if (!series) return;
          for (let i = 0; i < series.length; i++) {
            out[i] += series[i] * weight;
          }
        });
        return out;
      }
      function compoundSeries(initial, monthlyPct) {
        const values = [];
        let val = initial;
        for (const r of monthlyPct) {
          val = val * (1 + r / 100);
          values.push(val);
        }
        return values;
      }
      function buildPerformanceSeries(allocation, initialInvestment, monthlyContribution = 0) {
        const monthly = weightedMonthlyReturns(allocation);
        const normalizedContribution = Math.max(0, Number(monthlyContribution) || 0);
        const portfolio = [];
        const inflation = [];
        const contributed = [];
        const sleeveValues = Object.fromEntries(SLEEVE_SERIES.map(({ key }) => [key, []]));
        const sleeveContributed = Object.fromEntries(SLEEVE_SERIES.map(({ key }) => [key, []]));
        const sleeveState = Object.fromEntries(
          SLEEVE_SERIES.map(({ key }) => {
            return [
              key,
              {
                value: initialInvestment,
                contributed: initialInvestment,
                monthlyContribution: normalizedContribution,
              },
            ];
          })
        );
        let portfolioValue = initialInvestment;
        let inflationValue = initialInvestment;
        let totalContributed = initialInvestment;

        for (let i = 0; i < monthly.length; i++) {
          portfolioValue = portfolioValue * (1 + monthly[i] / 100) + normalizedContribution;
          inflationValue = inflationValue * (1 - BENCHMARK_INFLATION[i] / 100) + normalizedContribution;
          totalContributed += normalizedContribution;
          portfolio.push(portfolioValue);
          inflation.push(inflationValue);
          contributed.push(totalContributed);
          SLEEVE_SERIES.forEach(({ key }) => {
            const state = sleeveState[key];
            const assetMonthlyReturn = HISTORICAL_RETURNS[key]?.[i] || 0;
            state.value = state.value * (1 + assetMonthlyReturn / 100) + state.monthlyContribution;
            state.contributed += state.monthlyContribution;
            sleeveValues[key].push(state.value);
            sleeveContributed[key].push(state.contributed);
          });
        }

        return TIMELINE.map((t, i) => {
          const row = {
            date: t.label,
            portfolio: portfolio[i],
            inflation: inflation[i],
            contributed: contributed[i],
            recurringContributed: normalizedContribution * (i + 1),
            ts: t.date.getTime(),
          };
          SLEEVE_SERIES.forEach(({ key }) => {
            row[key] = sleeveValues[key][i];
            row[`${key}Contributed`] = sleeveContributed[key][i];
          });
          return row;
        });
      }

      function toPercentSeries(data, initialInvestment) {
        return data.map((row) => {
          const base = row.contributed || initialInvestment || 1;
          const percentRow = {
            ...row,
            portfolioPct: ((row.portfolio / base) - 1) * 100,
            inflationPct: ((row.inflation / base) - 1) * 100,
          };
          SLEEVE_SERIES.forEach(({ key }) => {
            const sleeveBase = row[`${key}Contributed`] || 0;
            percentRow[`${key}Pct`] =
              sleeveBase > 0 ? ((row[key] / sleeveBase) - 1) * 100 : 0;
          });
          return percentRow;
        });
      }
      function annualisedReturn(start, end, months) {
        if (start <= 0 || end <= 0 || months <= 0) return 0;
        const years = months / 12;
        return (Math.pow(end / start, 1 / years) - 1) * 100;
      }
      function stddev(values) {
        if (values.length <= 1) return 0;
        const mean = values.reduce((a, b) => a + b, 0) / values.length;
        const v =
          values.reduce((a, b) => a + (b - mean) * (b - mean), 0) /
          (values.length - 1);
        return Math.sqrt(v);
      }
      function computeStats(allocation, initialInvestment) {
        const monthly = weightedMonthlyReturns(allocation);
        const values = compoundSeries(initialInvestment, monthly);
        const months = monthly.length;
        const finalValue = values[values.length - 1];
        const totalReturn =
          ((finalValue - initialInvestment) / initialInvestment) * 100;
        const cagr = annualisedReturn(initialInvestment, finalValue, months);
        const volatility = stddev(monthly) * Math.sqrt(12);
        const meanCash =
          HISTORICAL_RETURNS.cash.reduce((a, b) => a + b, 0) /
          HISTORICAL_RETURNS.cash.length;
        const riskFreeAnnual = meanCash * 12;
        const sharpe =
          volatility > 0 ? (cagr - riskFreeAnnual) / volatility : 0;
        let peak = values[0];
        let maxDD = 0;
        for (const v of values) {
          if (v > peak) peak = v;
          const dd = (v - peak) / peak;
          if (dd < maxDD) maxDD = dd;
        }
        const perf = (n) => {
          const idx = values.length - 1 - n;
          if (idx < 0) return 0;
          return annualisedReturn(values[idx], values[values.length - 1], n);
        };
        return {
          cagr,
          volatility,
          sharpe,
          maxDrawdown: maxDD * 100,
          totalReturn,
          performance1y: perf(12),
          performance3y: perf(36),
          performance5y: perf(60),
          finalValue,
        };

          const targetFund = getTargetFundForSleeve(funds, sleeve);
          if (!targetFund) return;
          const monthlyAmount = normalizedMonthly * ((Number(allocationPct) || 0) / 100);
          monthlyMap[targetFund.name] = (monthlyMap[targetFund.name] || 0) + monthlyAmount;

        const [appMode, setAppMode] = useState("erste-premier");

        const setCurrency = (next) => {
          setCurrencyState((prev) => {
            if (prev === next) return prev;
            setInitialInvestment((amount) => convertAmount(amount, prev, next));
            setMonthlyContribution((amount) => convertAmount(amount, prev, next));
            return next;
          });
        };

        const value = useMemo(() => {
          const formatMoney = (amount, opts) => {
            const locale = currency === "CZK" ? "cs-CZ" : currency === "EUR" ? "de-DE" : "en-US";
            return new Intl.NumberFormat(locale, {
              style: "currency",
              currency,
              maximumFractionDigits: 0,
              notation: opts && opts.compact ? "compact" : "standard",
            }).format(amount);
          };
          return {
            currency,
            setCurrency,
            initialInvestment,
            setInitialInvestment,
            monthlyContribution,
            setMonthlyContribution,
            fxRate: FX_RATES_IN_CZK[currency] || 1,
            formatMoney,
            appMode,
            setAppMode,
          };
        }, [currency, initialInvestment, monthlyContribution, appMode]);

        return (
          <InvestmentContext.Provider value={value}>
            {children}
          </InvestmentContext.Provider>
        );
      }
      function useInvestment() {
        const ctx = useContext(InvestmentContext);
        if (!ctx)
          throw new Error("useInvestment must be used within InvestmentProvider");
        return ctx;
      }

      function EpTooltip({ active, payload, label, viewMode }) {
        const { formatMoney } = useInvestment();
        if (!active || !payload || !payload.length) return null;
        const formatValue = (value) =>
          viewMode === "percent"
            ? `${Number(value) >= 0 ? "+" : ""}${Number(value).toFixed(2)} %`
            : formatMoney(Number(value));
        const Row = ({ color, lbl, value }) => (
          <div className="flex items-center justify-between gap-6 py-0.5 text-sm">
            <span className="flex items-center gap-2 text-slate-600">
              <span className="h-2.5 w-2.5 rounded-full" style={{ backgroundColor: color }} />
              {lbl}
            </span>
            <span className="font-semibold ep-text-navy tabular-nums">{formatValue(value)}</span>
          </div>
        );
        const rows = payload.filter(
          (entry) => typeof entry?.value === "number" && Number.isFinite(entry.value)
        );
        return (
          <div className="rounded-xl border border-slate-200 bg-white/95 px-4 py-3 shadow-premium backdrop-blur">
            <div className="mb-1 text-[10px] font-semibold uppercase tracking-widest text-slate-500">{label}</div>
            {rows.map((entry) => (
              <Row
                key={entry.dataKey || entry.name}
                color={entry.color || entry.stroke || "#1e5fb8"}
                lbl={entry.name}
                value={entry.value}
              />
            ))}
          </div>
        );
      }

      function PerformanceChart({
        allocation,
        title = "Vývoj investice (modelace)",
        subtitle = "Hypotetický vývoj počáteční investice — měsíční granularita.",
        baseStrategyId = null,
      }) {
        const { currency, initialInvestment, monthlyContribution, formatMoney } = useInvestment();
        const chartId = useId().replace(/:/g, "");
        const portfolioGradientId = `ep-portfolio-fill-${chartId}`;
        const [viewMode, setViewMode] = useState("value");
        const [compareStrategyIds, setCompareStrategyIds] = useState([]);
        const [showSleeves, setShowSleeves] = useState(false);
        const [horizonMonths, setHorizonMonths] = useState(null);
        const [customDateFrom, setCustomDateFrom] = useState("");
        const [customDateTo, setCustomDateTo] = useState("");
        const TIMELINE_MIN = TIMELINE.length > 0
          ? `${TIMELINE[0].date.getFullYear()}-${String(TIMELINE[0].date.getMonth() + 1).padStart(2, "0")}`
          : "2021-01";
        const TIMELINE_MAX = TIMELINE.length > 0
          ? `${TIMELINE[TIMELINE.length - 1].date.getFullYear()}-${String(TIMELINE[TIMELINE.length - 1].date.getMonth() + 1).padStart(2, "0")}`
          : "";
        const HORIZON_OPTIONS = [
          { label: "1R", months: 12, title: "1 rok" },
          { label: "2R", months: 24, title: "2 roky" },
          { label: "3R", months: 36, title: "3 roky" },
          { label: "4R", months: 48, title: "4 roky" },
          { label: "5R", months: 60, title: "5 let" },
          { label: "Vše", months: null, title: "Celé dostupné období" },
          { label: "Vlastní", months: "custom", title: "Vlastní rozsah dat" },
        ];
        const effectiveMonthlyContribution = monthlyContribution;
        useEffect(() => {
          setCompareStrategyIds([]);
          setShowSleeves(false);
        }, [baseStrategyId, title]);
        useEffect(() => {
          if (compareStrategyIds.length > 0) {
            setShowSleeves(false);
          }
        }, [compareStrategyIds]);
        const activeComparisonStrategies = useMemo(
          () => COMPARISON_STRATEGIES.filter((strategy) => compareStrategyIds.includes(strategy.id)),
          [compareStrategyIds]
        );
        const activeSleeveSeries = useMemo(
          () =>
            SLEEVE_SERIES.filter(({ key }) => (Number(allocation?.[key]) || 0) > 0).map(
              ({ key, label, color }) => ({
                key,
                label,
                color,
                dataKey: viewMode === "percent" ? `${key}Pct` : key,
              })
            ),
          [allocation, viewMode]
        );
        const canSplitSleeves = compareStrategyIds.length === 0 && activeSleeveSeries.length > 0;
        useEffect(() => {
          if (showSleeves && canSplitSleeves) setViewMode("percent");
        }, [showSleeves, canSplitSleeves]);
        const rawData = useMemo(() => buildPerformanceSeries(allocation, initialInvestment, effectiveMonthlyContribution), [allocation, initialInvestment, effectiveMonthlyContribution]);
        const allComparisonSeriesMap = useMemo(() => {
          const entries = COMPARISON_STRATEGIES.map((strategy) => {
            const series = buildPerformanceSeries(strategy.allocation, initialInvestment, effectiveMonthlyContribution);
            return [strategy.id, viewMode === "percent" ? toPercentSeries(series, initialInvestment) : series];
          });
          return Object.fromEntries(entries);
        }, [initialInvestment, effectiveMonthlyContribution, viewMode]);
        const data = useMemo(() => {
          const baseSeries = viewMode === "percent" ? toPercentSeries(rawData, initialInvestment) : rawData;
          return baseSeries.map((row, index) => {
            const extra = {};
            COMPARISON_STRATEGIES.forEach((strategy) => {
              if (!compareStrategyIds.includes(strategy.id)) return;
              const compareRow = allComparisonSeriesMap[strategy.id]?.[index];
              if (!compareRow) return;
              extra[`comparison_${strategy.id}`] = viewMode === "percent" ? compareRow.portfolioPct : compareRow.portfolio;
            });
            return { ...row, ...extra };
          });
        }, [rawData, initialInvestment, viewMode, compareStrategyIds, allComparisonSeriesMap]);
        const displayData = useMemo(() => {
          if (horizonMonths === "custom") {
            const fromTs = customDateFrom ? new Date(customDateFrom + "-01").getTime() : -Infinity;
            const toTs = customDateTo ? (() => { const d = new Date(customDateTo + "-01"); d.setMonth(d.getMonth() + 1); return d.getTime() - 1; })() : Infinity;
            return data.filter((row) => row.ts >= fromTs && row.ts <= toTs);
          }
          return horizonMonths ? data.slice(-horizonMonths) : data;
        }, [data, horizonMonths, customDateFrom, customDateTo]);
        const xTicks = useMemo(() => displayData.filter((_, i) => i % 6 === 0).map((d) => d.date), [displayData]);
        const portfolioKey = viewMode === "percent" ? "portfolioPct" : "portfolio";
        const inflationKey = viewMode === "percent" ? "inflationPct" : "inflation";
        const finalValue = displayData.length ? displayData[displayData.length - 1][portfolioKey] : initialInvestment;
        const lastRow = rawData.length ? rawData[rawData.length - 1] : null;
        const totalContributed = lastRow ? lastRow.contributed : initialInvestment;
        const recurringContributed = lastRow ? lastRow.recurringContributed : 0;
        const absoluteGain = lastRow ? lastRow.portfolio - totalContributed : 0;
        const totalChange = totalContributed > 0 ? (absoluteGain / totalContributed) * 100 : 0;
        const toggleComparisonStrategy = (strategyId) => {
          if (strategyId === baseStrategyId) return;
          setCompareStrategyIds((prev) =>
            prev.includes(strategyId)
              ? prev.filter((id) => id !== strategyId)
              : [...prev, strategyId]
          );

        return (
          <section className="rounded-2xl border border-slate-200 bg-white p-5 shadow-premium md:p-7">
            <div className="mb-4 flex flex-col gap-3 md:mb-6 md:flex-row md:items-start md:justify-between">

                <div className="rounded-xl border border-slate-200 bg-slate-50 px-4 py-2 text-right shrink-0">
                  <div className="text-[10px] uppercase tracking-widest text-slate-500">{viewMode === "percent" ? "Konečná výkonnost" : "Konečná hodnota"}</div>
                  <div className="font-semibold ep-text-navy md:text-lg">{viewMode === "percent" ? `${Number(finalValue) >= 0 ? "+" : ""}${Number(finalValue).toFixed(2)} %` : formatMoney(finalValue)}</div>
                  <div className={"text-xs font-semibold tabular-nums " + (totalChange >= 0 ? "text-emerald-600" : "text-rose-600")}>{totalChange >= 0 ? "▲" : "▼"} {totalChange.toFixed(2)} % proti vloženým prostředkům</div>
                </div>
                <div className="inline-flex items-center rounded-full border border-slate-200 bg-slate-50 p-1 shrink-0" role="tablist" aria-label="Typ zobrazení grafu">
                  {[{ id: "value", label: `Hodnota ${currency}` }, { id: "percent", label: "Výkonnost %" }].map((option) => {
                    const active = viewMode === option.id;
                    const locked = showSleeves && canSplitSleeves && option.id === "value";
                    return (
                      <button
                        key={option.id}
                        type="button"
                        role="tab"
                        aria-selected={active}
                        disabled={locked}
                        onClick={() => !locked && setViewMode(option.id)}
                        title={locked ? "Při rozdělení do složek je dostupná pouze výkonnost" : undefined}
                        className={"rounded-full px-3 py-1.5 text-xs font-semibold tracking-wide transition-all " + (locked ? "cursor-not-allowed opacity-40 text-slate-400" : active ? "bg-ep-navy text-white shadow-sm" : "text-slate-600 hover:text-slate-900")}
                      >
                        {option.label}
                      </button>
                    );
                  })}
                </div>
              </div>
            </div>
            <div className="mb-4">
              <div className="mb-2 flex flex-wrap items-center justify-between gap-3">
                <div className="text-[10px] font-semibold uppercase tracking-[0.28em] text-slate-500">Srovnání strategií</div>
                <label
                  className={
                    "inline-flex items-center gap-2 text-xs font-semibold " +
                    (canSplitSleeves ? "cursor-pointer text-slate-700" : "cursor-not-allowed text-slate-400")
                  }
                >
                  <input
                    type="checkbox"
                    checked={showSleeves && canSplitSleeves}
                    onChange={(e) => setShowSleeves(e.target.checked)}
                    disabled={!canSplitSleeves}
                    className="h-4 w-4 rounded border-slate-300 text-ep-blue focus:ring-ep-blue/30"
                  />
                  Rozdělit do složek
                </label>
              </div>
              <div className="flex flex-wrap gap-2">
                {COMPARISON_STRATEGIES.map((strategy) => {
                  const active = compareStrategyIds.includes(strategy.id);
                  const disabled = strategy.id === baseStrategyId;
                  return (
                    <button
                      key={strategy.id}
                      type="button"
                      onClick={() => toggleComparisonStrategy(strategy.id)}
                      disabled={disabled}
                      className={
                        "inline-flex items-center rounded-full border px-3 py-1.5 text-xs font-semibold transition-all " +
                        (disabled
                          ? "cursor-default border-slate-200 bg-slate-100 text-slate-400"
                          : active
                          ? "text-white shadow-sm"
                          : "border-slate-200 bg-white text-slate-700 hover:border-slate-300 hover:bg-slate-50")
                      }
                      style={active && !disabled ? { backgroundColor: strategy.color, borderColor: strategy.color } : undefined}
                    >
                      {strategy.name.replace("RŘC", "RŘC ")}
                    </button>
                  );
                })}
              </div>
              {!canSplitSleeves && compareStrategyIds.length > 0 ? (
                <p className="mt-2 text-[11px] text-slate-500">
                  Rozdělení do složek je dostupné jen při zobrazení jedné varianty bez srovnání.
                </p>
              ) : null}
            </div>

            <div className="mb-4 grid gap-3 md:grid-cols-3">
              <div className="rounded-xl border border-slate-200 bg-slate-50 px-4 py-3">
                <div className="text-[10px] uppercase tracking-widest text-slate-500">Celkem vloženo</div>
                <div className="mt-1 text-base font-semibold ep-text-navy">{formatMoney(totalContributed)}</div>
              </div>
              <div className="rounded-xl border border-slate-200 bg-slate-50 px-4 py-3">
                <div className="text-[10px] uppercase tracking-widest text-slate-500">Jednorázově vloženo</div>
                <div className="mt-1 text-base font-semibold ep-text-navy">{formatMoney(initialInvestment)}</div>

                <div className="text-[10px] uppercase tracking-widest text-slate-500">Pravidelně vloženo</div>

                      max={customDateTo || TIMELINE_MAX}
                      onChange={(e) => setCustomDateFrom(e.target.value)}
                      className="rounded-lg border border-slate-300 bg-white px-2 py-1 text-xs font-medium text-slate-800 focus:border-ep-blue focus:outline-none focus:ring-1 focus:ring-ep-blue/30"

                {!showSleeves && activeComparisonStrategies.map((strategy) => (

      function PortfolioDetailEditor({ portfolio, onAllocationChange }) {
        const { currency, initialInvestment, monthlyContribution, formatMoney } = useInvestment();
        const [funds, setFunds] = useState(() => getTemplateFundsForCurrency(portfolio, currency));
        const [showSearch, setShowSearch] = useState(false);
        const [searchQuery, setSearchQuery] = useState("");
        const [filterSleeve, setFilterSleeve] = useState("Všechny složky");

        useEffect(() => {
          setFunds(getTemplateFundsForCurrency(portfolio, currency));
          setShowSearch(false);
          setSearchQuery("");
          setFilterSleeve("Všechny složky");
        }, [portfolio, currency]);

        useEffect(() => {
          onAllocationChange(funds);
        }, [funds, onAllocationChange]);

        const total = funds.reduce((sum, fund) => sum + (Number(fund.weight) || 0), 0);
        const sleeveOrder = ["Úroková složka", "Akciová složka", "Alternativní složka"];
        const sleeveCaps = {
          "Úroková složka": portfolio.allocation?.bonds || 0,
          "Akciová složka": portfolio.allocation?.stocks || 0,
          "Alternativní složka": portfolio.allocation?.alternatives || 0,
        };
        const sleeveTone = {
          "Úroková složka": "bg-sky-50 text-sky-700 border-sky-200",
          "Akciová složka": "bg-indigo-50 text-indigo-700 border-indigo-200",
          "Alternativní složka": "bg-amber-50 text-amber-700 border-amber-200",
        };
        const existingFundNames = new Set(funds.map((fund) => fund.name.trim().toLowerCase()));
        const grouped = funds.reduce((acc, fund) => {
          if (!acc[fund.sleeve]) acc[fund.sleeve] = [];
          acc[fund.sleeve].push(fund);
          return acc;
        }, {});
        const orderedGroups = sleeveOrder.filter((key) => grouped[key]).map((key) => [key, grouped[key]]);

        const getSleeveTotal = (sleeve, excludeIndex = -1) =>
          funds.reduce((sum, fund, i) => {
            if (i === excludeIndex || fund.sleeve !== sleeve) return sum;
            return sum + (Number(fund.weight) || 0);
          }, 0);

        const getMaxWeightForIndex = (index) => {
          const current = funds[index];
          if (!current) return 0;
          const totalWithoutCurrent = funds.reduce((sum, fund, i) => {
            if (i === index) return sum;
            return sum + (Number(fund.weight) || 0);
          }, 0);
          const sleeveWithoutCurrent = getSleeveTotal(current.sleeve, index);
          const totalCap = 100 - totalWithoutCurrent;
          const sleeveCap = (sleeveCaps[current.sleeve] || 0) - sleeveWithoutCurrent;
          return Math.max(0, Math.min(totalCap, sleeveCap));
        };

        const clampWeightForIndex = (index, nextValue) => {
          const maxAllowed = getMaxWeightForIndex(index);
          return Math.max(0, Math.min(maxAllowed, Math.round(Number(nextValue) || 0)));
        };

        const updateFundWeight = (index, value) => {
          setFunds((prev) =>
            prev.map((fund, i) =>
              i === index
                ? { ...fund, weight: clampWeightForIndex(index, value) }
                : fund
            )
          );
        };

        const removeFund = (index) => {
          setFunds((prev) => prev.filter((_, i) => i !== index));
        };

        const resetFunds = () => {
          setFunds(getTemplateFundsForCurrency(portfolio, currency));
          setShowSearch(false);
          setSearchQuery("");
          setFilterSleeve("Všechny složky");
        };

        const normalizedQuery = searchQuery.trim().toLowerCase();
        const activeFunds = ALL_FUNDS_BY_CURRENCY[currency] || [];
        const activeIsins = KNOWN_ISINS_BY_CURRENCY[currency] || {};
        const availableFunds = activeFunds.filter((fund) => {
          const matchesSleeve = filterSleeve === "Všechny složky" ? true : fund.sleeve === filterSleeve;
          const matchesQuery = normalizedQuery ? fund.name.toLowerCase().includes(normalizedQuery) : true;
          const notAlreadyUsed = !existingFundNames.has(fund.name.trim().toLowerCase());
          return matchesSleeve && matchesQuery && notAlreadyUsed;
        });

        const addSelectedFund = (fund) => {
          setFunds((prev) => [...prev, { name: fund.name, sleeve: fund.sleeve, weight: 0 }]);
          setShowSearch(false);
          setSearchQuery("");
        };

        const isinFor = (fundName) => activeIsins[fundName] || "";
        const amountForFund = (fund) => amountForFundDisplay(fund, funds, initialInvestment, monthlyContribution, sleeveCaps, formatMoney);
        const renderAmountCell = (fund, compact = false) => {
          const amount = amountForFund(fund);
          return (
            <div className={compact ? "text-left" : "text-right"}>
              <div className="text-xs font-semibold tabular-nums ep-text-navy">{amount.oneTime}</div>
            </div>
          );
        };

        return (
          <section className="rounded-2xl border border-slate-200 bg-white p-3 shadow-premium md:p-5">
            <div className="mb-3 flex flex-col gap-3 lg:flex-row lg:items-start lg:justify-between">
              <div>
                <h3 className="text-sm font-semibold ep-text-navy md:text-base">Složení a alokace fondů</h3>
                <p className="mt-1 text-[11px] font-semibold text-slate-600 md:text-xs">{portfolio.name}</p>
                <p className="text-[11px] text-slate-500 md:text-xs">U každého fondu vidíš podíl v % i odpovídající jednorázovou částku. Limity portfolia a složek zůstávají uzamčené.</p>
              </div>
              <div className="flex flex-wrap items-center gap-2 lg:justify-end">
                <div className="inline-flex items-center rounded-full border border-emerald-200 bg-emerald-50 px-3 py-1 text-xs font-semibold text-emerald-700">{total} / 100 %</div>
                <button type="button" onClick={resetFunds} className="inline-flex items-center justify-center gap-1.5 rounded-xl border border-slate-200 bg-white px-3 py-2 text-[11px] font-semibold ep-text-navy transition hover:border-ep-blue/40 hover:bg-slate-50"><RotateCcwIcon size={14} />Obnovit výchozí</button>
                <button type="button" onClick={() => setShowSearch((prev) => !prev)} className="inline-flex items-center justify-center gap-1.5 rounded-xl bg-ep-blue px-3 py-2 text-[11px] font-semibold text-white transition hover:bg-ep-blue-light">+ Přidat fond</button>
              </div>
            </div>

            {showSearch && (
              <div className="mb-4 rounded-2xl border border-ep-blue/20 bg-slate-50 p-3 fade-in">
                <div className="grid gap-2 lg:grid-cols-[minmax(0,1fr)_220px] lg:items-center">
                  <input type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder="Hledat fond..." className="min-w-0 rounded-xl border border-slate-300 bg-white px-4 py-2.5 text-sm text-slate-700 outline-none focus:border-ep-blue focus:ring-2 focus:ring-ep-blue/20" aria-label="Hledat fond" />
                  <select value={filterSleeve} onChange={(e) => setFilterSleeve(e.target.value)} className="min-w-0 rounded-xl border border-slate-300 bg-white px-4 py-2.5 text-sm text-slate-700 outline-none focus:border-ep-blue focus:ring-2 focus:ring-ep-blue/20" aria-label="Filtrovat složku fondu">
                    <option>Všechny složky</option>
                    {sleeveOrder.map((option) => (<option key={option} value={option}>{option}</option>))}
                  </select>
                </div>
                <div className="mt-2 rounded-xl border border-slate-200 bg-white">
                  <div className="max-h-52 overflow-y-auto divide-y divide-slate-100">
                    {availableFunds.map((fund) => (
                      <button key={`${fund.name}-${fund.sleeve}`} type="button" onClick={() => addSelectedFund(fund)} className="flex w-full items-center justify-between gap-4 px-4 py-2.5 text-left transition hover:bg-slate-50">
                        <div className="min-w-0">
                          <div className="truncate text-sm font-medium text-slate-700">{fund.name}</div>
                          <div className="text-[11px] text-slate-500">{fund.sleeve}{isinFor(fund.name) ? ` · ISIN ${isinFor(fund.name)}` : " · ISIN doplníme"}</div>
                        </div>
                        <div className="shrink-0 text-[11px] font-semibold text-ep-blue">Přidat</div>
                      </button>
                    ))}
                    {!availableFunds.length && <div className="px-4 py-5 text-sm text-slate-500">Všechny odpovídající fondy už v řešení jsou, nebo nebyl nalezen žádný další fond.</div>}
                  </div>
                </div>
              </div>
            )}

            <div className="rounded-2xl border border-slate-200 bg-slate-50/70">
              <div className="grid grid-cols-[minmax(0,1.5fr)_minmax(120px,0.75fr)_minmax(88px,0.5fr)_32px] gap-2 border-b border-slate-200 px-3 py-2 text-[10px] font-semibold uppercase tracking-wide text-slate-500 md:grid-cols-[minmax(0,1.7fr)_minmax(170px,0.9fr)_minmax(88px,0.5fr)_minmax(120px,0.7fr)_32px]">
                <div>Fond / ISIN</div>
                <div>Alokace</div>
                <div className="text-right">%</div>
                <div className="hidden md:block text-right">Jednorázově</div>
                <div></div>
              </div>

              <div>
                {orderedGroups.map(([sleeve, items]) => (
                  <div key={sleeve} className="border-b border-slate-200 last:border-b-0">
                    <div className="flex items-center justify-between gap-3 px-3 py-2">
                      <div className={`inline-flex items-center rounded-full border px-2 py-1 text-[10px] font-semibold ${sleeveTone[sleeve] || 'bg-slate-100 text-slate-700 border-slate-200'}`}>{sleeve}</div>
                      <div className="text-[10px] font-semibold text-slate-500">{items.reduce((sum, fund) => sum + (Number(fund.weight) || 0), 0)} / {sleeveCaps[sleeve]} %</div>
                    </div>
                    <div>
                      {items.map((fund, rowIndex) => {
                        const originalIndex = funds.findIndex((f) => f === fund);
                        const isin = isinFor(fund.name);
                        return (
                          <div key={`${fund.name}-${originalIndex}`} className={`grid grid-cols-[minmax(0,1.5fr)_minmax(120px,0.75fr)_minmax(88px,0.5fr)_32px] gap-2 px-3 py-2.5 md:grid-cols-[minmax(0,1.7fr)_minmax(170px,0.9fr)_minmax(88px,0.5fr)_minmax(120px,0.7fr)_32px] ${rowIndex !== items.length - 1 ? 'border-b border-slate-100' : ''}`}>
                            <div className="min-w-0">
                              <div className="truncate text-xs font-semibold ep-text-navy">{fund.name}</div>
                              <div className="mt-0.5 text-[10px] text-slate-500">{isin ? `ISIN ${isin}` : 'ISIN doplníme'}</div>
                              <div className="mt-1 text-[10px] text-slate-400 md:hidden">{renderAmountCell(fund, true)}</div>
                            </div>
                            <div className="flex items-center px-1">
                              <input type="range" min={0} max={100} step={1} value={Math.min(fund.weight, 100)} onChange={(e) => updateFundWeight(originalIndex, e.target.value)} style={{ "--val": `${Math.min(fund.weight, 100)}%` }} className="ep-slider" aria-label="Slider váhy fondu" />
                            </div>
                            <div className="relative self-center">
                              <input type="number" min={0} max={100} step={1} value={fund.weight} onChange={(e) => updateFundWeight(originalIndex, e.target.value)} className="no-spin w-full rounded-lg border border-slate-200 bg-white px-2.5 py-2 pr-7 text-right text-xs font-semibold tabular-nums ep-text-navy outline-none focus:border-ep-blue focus:ring-2 focus:ring-ep-blue/20" aria-label="Alokace fondu" onFocus={(e) => e.target.select()} />
                              <span className="pointer-events-none absolute right-2.5 top-1/2 -translate-y-1/2 text-[10px] text-slate-500">%</span>
                            </div>
                            <div className="hidden self-center text-right text-xs font-semibold tabular-nums ep-text-navy md:block">{renderAmountCell(fund)}</div>
                            <button type="button" onClick={() => removeFund(originalIndex)} className="inline-flex h-7 w-7 items-center justify-center self-center rounded-md border border-transparent bg-transparent text-slate-400 transition hover:border-rose-200 hover:bg-rose-50 hover:text-rose-500" aria-label="Odebrat fond">×</button>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>
        );

      function PresetPortfolios() {
        const { currency, initialInvestment } = useInvestment();
        const [selectedId, setSelectedId] = useState(null);
        const [detailFunds, setDetailFunds] = useState([]);
        const stats = useMemo(() => {
          const out = {};
          PRESET_PORTFOLIOS.forEach((p) => {
            const funds = getTemplateFundsForCurrency(p, currency);
            const portPerf = computePortfolioPerf(funds, currency);
            out[p.id] = { ...computeStats(p.allocation, initialInvestment), ...portPerf };
          });
          return out;
        }, [initialInvestment, currency]);
        const selected = PRESET_PORTFOLIOS.find((p) => p.id === selectedId) || null;
        useEffect(() => {
          if (!selected) {
            setDetailFunds([]);
            return;
          }
          setDetailFunds(getTemplateFundsForCurrency(selected, currency));
        }, [selected, currency]);
        const detailAllocation = useMemo(() => {
          if (!detailFunds || !detailFunds.length)
            return selected ? selected.allocation : { bonds: 0, stocks: 0, alternatives: 0 };
          return detailFunds.reduce((acc, fund) => {
            const bucket = fund.sleeve === "Úroková složka" ? "bonds" : fund.sleeve === "Akciová složka" ? "stocks" : "alternatives";
            acc[bucket] += Number(fund.weight) || 0;
            return acc;
          }, { bonds: 0, stocks: 0, alternatives: 0 });
        }, [detailFunds, selected]);
        const openDetail = (portfolio) => {
          setSelectedId(portfolio.id);
          setDetailFunds(getTemplateFundsForCurrency(portfolio, currency));
        };
        return (
          <div className="space-y-6">
            <div className="grid gap-5 md:grid-cols-2 xl:grid-cols-4">
              {PRESET_PORTFOLIOS.map((p) => {
                const s = stats[p.id];
                const isSelected = selectedId === p.id;
                return (
                  <article key={p.id} className={"group relative flex flex-col rounded-2xl border bg-white p-5 shadow-premium transition-all duration-300 " + (isSelected ? "border-ep-gold/70 ring-2 ring-ep-gold/30 shadow-premium-hover" : "border-slate-200 hover:-translate-y-0.5 hover:border-ep-blue/30 hover:shadow-premium-hover")}>
                    <header className="mb-4 flex items-start justify-between gap-3">
                      <div className="flex items-center gap-3">
                        <div className="flex h-10 w-10 items-center justify-center rounded-lg border border-slate-200 bg-slate-50"><PortfolioIcon id={p.id} /></div>
                        <div className="min-w-0">
                          <div className="flex items-center gap-2 flex-wrap">
                            <h3 className="text-base font-semibold ep-text-navy">{p.name}</h3>
                            <RiskBadge level={p.riskLevel} label={p.riskLabel} />
                          </div>
                        </div>
                      </div>
                    </header>
                    <p className="mb-4 text-sm leading-relaxed text-slate-500">{p.tagline}</p>
                    <div className="mb-4 flex items-start gap-3.5">
                      <DonutChart allocation={p.allocation} />
                      <AllocationLegend allocation={p.allocation} />
                    </div>

                    </button>

      /* ------------------------------------------------------------------ */
      /*  Custom Portfolio Builder                                           */
      /* ------------------------------------------------------------------ */
      function getClosestPortfolioProfile(funds, currency) {
        if (!funds || !funds.length) {
          return {
            label: "Nejkonzervativnější strategie",
            nearestId: "rrc1",
            nearestName: "RŘC1",
            nearestRiskLabel: "Nejkonzervativnější strategie",
            score: 0,
            isCustom: false,
          };
        }

        const currentMap = {};
        funds.forEach((fund) => {
          currentMap[fund.name] = Number(fund.weight) || 0;
        });

        const comparisons = PRESET_PORTFOLIOS.map((preset) => {
          const presetMap = {};
          getTemplateFundsForCurrency(preset, currency).forEach((fund) => {
            presetMap[fund.name] = Number(fund.weight) || 0;
          });
          const allFundNames = new Set([...Object.keys(currentMap), ...Object.keys(presetMap)]);
          let score = 0;
          allFundNames.forEach((fundName) => {
            score += Math.abs((currentMap[fundName] || 0) - (presetMap[fundName] || 0));
          });
          return {
            id: preset.id,
            name: preset.name,
            label: preset.riskLabel,
            score,
          };
        }).sort((a, b) => a.score - b.score);

        const best = comparisons[0];
        return {
          label: best.label,
          nearestId: best.id,
          nearestName: best.name,
          nearestRiskLabel: best.label,
          score: best.score,
          isCustom: best.score > 20,
        };
      }

      function CustomPortfolioBuilder() {
        const { currency, initialInvestment, monthlyContribution, formatMoney } = useInvestment();
        const [funds, setFunds] = useState([]);
        const [showSearch, setShowSearch] = useState(false);
        const [searchQuery, setSearchQuery] = useState("");
        const [filterSleeve, setFilterSleeve] = useState("Všechny složky");
        const [activeTemplate, setActiveTemplate] = useState("custom");
        const [showSimulation, setShowSimulation] = useState(false);

        const sleeveOrder = ["Úroková složka", "Akciová složka", "Alternativní složka"];
        const sleeveTone = {
          "Úroková složka": "bg-sky-50 text-sky-700 border-sky-200",
          "Akciová složka": "bg-indigo-50 text-indigo-700 border-indigo-200",
          "Alternativní složka": "bg-amber-50 text-amber-700 border-amber-200",
        };

        const total = useMemo(
          () => funds.reduce((sum, fund) => sum + (Number(fund.weight) || 0), 0),
          [funds]
        );
        const remaining = 100 - total;
        const valid = total === 100;
        const profile = useMemo(() => getClosestPortfolioProfile(funds, currency), [funds, currency]);

        const grouped = useMemo(() => funds.reduce((acc, fund) => {
          if (!acc[fund.sleeve]) acc[fund.sleeve] = [];
          acc[fund.sleeve].push(fund);
          return acc;
        }, {}), [funds]);
        const orderedGroups = sleeveOrder.filter((key) => grouped[key]).map((key) => [key, grouped[key]]);

        const detailAllocation = useMemo(() => {
          return funds.reduce((acc, fund) => {
            const bucket = fund.sleeve === "Úroková složka" ? "bonds" : fund.sleeve === "Akciová složka" ? "stocks" : "alternatives";
            acc[bucket] += Number(fund.weight) || 0;
            return acc;
          }, { bonds: 0, stocks: 0, alternatives: 0 });
        }, [funds]);
        const customStats = useMemo(() => {
          const portPerf = computePortfolioPerf(funds, currency);
          return { ...computeStats(detailAllocation, initialInvestment), ...portPerf };
        }, [detailAllocation, initialInvestment, funds, currency]);
        const customBaseStrategyId = useMemo(() => {
          return activeTemplate !== "custom" ? activeTemplate : null;
        }, [activeTemplate]);
        const sleeveAllocationMap = useMemo(() => ({
          "Úroková složka": detailAllocation.bonds || 0,
          "Akciová složka": detailAllocation.stocks || 0,
          "Alternativní složka": detailAllocation.alternatives || 0,
        }), [detailAllocation]);

        const existingFundNames = new Set(funds.map((fund) => fund.name.trim().toLowerCase()));
        const normalizedQuery = searchQuery.trim().toLowerCase();
        const activeFunds = ALL_FUNDS_BY_CURRENCY[currency] || [];
        const activeIsins = KNOWN_ISINS_BY_CURRENCY[currency] || {};
        const availableFunds = activeFunds.filter((fund) => {
          const matchesSleeve = filterSleeve === "Všechny složky" ? true : fund.sleeve === filterSleeve;
          const matchesQuery = normalizedQuery ? fund.name.toLowerCase().includes(normalizedQuery) : true;
          const notAlreadyUsed = !existingFundNames.has(fund.name.trim().toLowerCase());
          return matchesSleeve && matchesQuery && notAlreadyUsed;
        });

        const templateOrder = [{ id: "custom", label: "Prázdné portfolio" }, ...PRESET_PORTFOLIOS.map((p) => ({ id: p.id, label: p.name }))];

        useEffect(() => {
          const template = activeTemplate !== "custom" ? PRESET_PORTFOLIOS.find((p) => p.id === activeTemplate) : null;
          if (template) {
            setFunds(getTemplateFundsForCurrency(template, currency));
          } else {
            setFunds((prev) => filterFundsByCurrency(prev, currency));
          }
          setShowSearch(false);
          setSearchQuery("");
          setFilterSleeve("Všechny složky");
          setShowSimulation(false);
        }, [currency, activeTemplate]);

        const loadTemplate = (id) => {
          if (id === "custom") {
            setFunds([]);
            setActiveTemplate("custom");
            setShowSearch(false);
            setSearchQuery("");
            setFilterSleeve("Všechny složky");
            setShowSimulation(false);
            return;
          }
          const template = PRESET_PORTFOLIOS.find((p) => p.id === id);
          if (!template) return;
          setFunds(getTemplateFundsForCurrency(template, currency));
          setActiveTemplate(id);
          setShowSearch(false);
          setSearchQuery("");
          setFilterSleeve("Všechny složky");
          setShowSimulation(false);
        };

        const getMaxWeightForIndex = (index) => {
          const totalWithoutCurrent = funds.reduce((sum, fund, i) => i === index ? sum : sum + (Number(fund.weight) || 0), 0);
          return Math.max(0, 100 - totalWithoutCurrent);
        };

        const clampWeightForIndex = (index, nextValue) => {
          const maxAllowed = getMaxWeightForIndex(index);
          return Math.max(0, Math.min(maxAllowed, Math.round(Number(nextValue) || 0)));
        };

        const updateFundWeight = (index, value) => {
          setFunds((prev) => prev.map((fund, i) => i === index ? { ...fund, weight: clampWeightForIndex(index, value) } : fund));
          setActiveTemplate("custom");
          setShowSimulation(false);
        };

        const removeFund = (index) => {
          setFunds((prev) => prev.filter((_, i) => i !== index));
          setActiveTemplate("custom");
          setShowSimulation(false);
        };

        const resetCurrent = () => {
          if (activeTemplate !== "custom") {
            loadTemplate(activeTemplate);
          } else {
            setFunds([]);
            setShowSearch(false);
            setSearchQuery("");
            setFilterSleeve("Všechny složky");
            setShowSimulation(false);
          }
        };

        const addSelectedFund = (fund) => {
          setFunds((prev) => [...prev, { name: fund.name, sleeve: fund.sleeve, weight: 0 }]);
          setShowSearch(false);
          setSearchQuery("");
          setActiveTemplate("custom");
          setShowSimulation(false);
        };

        const runSimulation = () => {
          if (!valid || !funds.length) return;
          setShowSimulation(true);
        };

        const isinFor = (fundName) => activeIsins[fundName] || "";
        const amountForFund = (fund) => amountForFundDisplay(fund, funds, initialInvestment, monthlyContribution, sleeveAllocationMap, formatMoney);
        const renderAmountCell = (fund, compact = false) => {
          const amount = amountForFund(fund);
          return (
            <div className={compact ? "text-left" : "text-right"}>

            </div>

        return (

                    <div className="text-[10px] uppercase tracking-widest text-slate-500">Celková alokace</div>

                  </div>
                  <div>
                    <div className="text-[10px] uppercase tracking-widest text-slate-500">Stav</div>
                    <div className={"text-sm font-semibold " + (valid ? "text-emerald-600" : "text-amber-600")}>
                      {valid ? "Portfolio je připravené pro modelaci" : remaining > 0 ? `Chybí doplnit ${remaining} %` : `Je potřeba ubrat ${Math.abs(remaining)} %`}
                    </div>
                  </div>
                  <div>
                    <div className="text-[10px] uppercase tracking-widest text-slate-500">Profil portfolia</div>
                    <div className="text-sm font-semibold ep-text-navy">{profile.isCustom ? `Vlastní skladba (nejblíže: ${profile.nearestRiskLabel})` : profile.label}</div>
                  </div>
                </div>
              </div>
            </section>

            {showSearch && (
              <section className="rounded-2xl border border-ep-blue/20 bg-white p-4 shadow-premium fade-in">
                <div className="grid gap-2 lg:grid-cols-[minmax(0,1fr)_220px] lg:items-center">
                  <input type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder="Hledat fond do vlastního portfolia..." className="min-w-0 rounded-xl border border-slate-300 bg-white px-4 py-2.5 text-sm text-slate-700 outline-none focus:border-ep-blue focus:ring-2 focus:ring-ep-blue/20" aria-label="Hledat fond" />
                  <select value={filterSleeve} onChange={(e) => setFilterSleeve(e.target.value)} className="min-w-0 rounded-xl border border-slate-300 bg-white px-4 py-2.5 text-sm text-slate-700 outline-none focus:border-ep-blue focus:ring-2 focus:ring-ep-blue/20" aria-label="Filtrovat složku fondu">
                    <option>Všechny složky</option>
                    {sleeveOrder.map((option) => (<option key={option} value={option}>{option}</option>))}
                  </select>
                </div>
                <div className="mt-2 rounded-xl border border-slate-200 bg-white">
                  <div className="max-h-56 overflow-y-auto divide-y divide-slate-100">
                    {availableFunds.map((fund) => (
                      <button key={`${fund.name}-${fund.sleeve}`} type="button" onClick={() => addSelectedFund(fund)} className="flex w-full items-center justify-between gap-4 px-4 py-2.5 text-left transition hover:bg-slate-50">
                        <div className="min-w-0">
                          <div className="truncate text-sm font-medium text-slate-700">{fund.name}</div>
                          <div className="text-[11px] text-slate-500">{fund.sleeve}{isinFor(fund.name) ? ` · ISIN ${isinFor(fund.name)}` : " · ISIN doplníme"}</div>

                  </div>
                </div>
              </section>
            )}

            <section className="rounded-2xl border border-slate-200 bg-white p-4 shadow-premium md:p-6">
              <div className="mb-3 flex flex-col gap-3 lg:flex-row lg:items-start lg:justify-between">
                <div>
                  <h3 className="text-sm font-semibold ep-text-navy md:text-base">Složení a alokace fondů</h3>
                  
                  
                </div>
                <div className="flex flex-col gap-2 lg:items-end">
                  <div className="flex flex-wrap gap-2 lg:justify-end">
                    {templateOrder.map((template) => (
                      <button
                        key={template.id}
                        type="button"
                        onClick={() => loadTemplate(template.id)}
                        className={"rounded-full px-3 py-1.5 text-xs font-semibold tracking-wide transition-all " + (activeTemplate === template.id ? "bg-ep-gold text-ep-navy shadow-sm" : "border border-slate-200 bg-white text-slate-600 hover:border-ep-blue/30 hover:text-slate-900")}
                      >
                        {template.label}
                      </button>
                    ))}
                  </div>
                  <div className="flex flex-wrap items-center gap-2 lg:justify-end">
                    <div className="inline-flex items-center rounded-full border border-emerald-200 bg-emerald-50 px-3 py-1 text-xs font-semibold text-emerald-700">{total} / 100 %</div>
                    <button type="button" onClick={resetCurrent} className="inline-flex items-center justify-center gap-1.5 rounded-xl border border-slate-200 bg-white px-3 py-2 text-[11px] font-semibold ep-text-navy transition hover:border-ep-blue/40 hover:bg-slate-50"><RotateCcwIcon size={14} />{activeTemplate === "custom" ? "Vymazat portfolio" : "Obnovit předlohu"}</button>
                    <button type="button" onClick={() => setShowSearch((prev) => !prev)} className="inline-flex items-center justify-center gap-1.5 rounded-xl bg-ep-blue px-3 py-2 text-[11px] font-semibold text-white transition hover:bg-ep-blue-light">+ Přidat fond</button>
                    <button type="button" onClick={runSimulation} disabled={!valid || !funds.length} className={"inline-flex items-center justify-center gap-1.5 rounded-xl px-3 py-2 text-[11px] font-semibold transition " + (valid && funds.length ? "bg-ep-navy text-white hover:bg-ep-blue" : "cursor-not-allowed border border-slate-200 bg-slate-100 text-slate-400")}><PlayCircleIcon size={14} />Spustit simulaci vývoje</button>

                {!funds.length ? (
                  <div className="px-4 py-8 text-center text-sm text-slate-500">
                    Portfolio je zatím prázdné. Začni tlačítkem <span className="font-semibold">+ Přidat fond</span> nebo si vyber některou z předloh RŘC 1–4.
                  </div>
                ) : (
                  <div>
                    {orderedGroups.map(([sleeve, items]) => (
                      <div key={sleeve} className="border-b border-slate-200 last:border-b-0">
                        <div className="flex items-center justify-between gap-3 px-3 py-2">
                          <div className={`inline-flex items-center rounded-full border px-2 py-1 text-[10px] font-semibold ${sleeveTone[sleeve] || 'bg-slate-100 text-slate-700 border-slate-200'}`}>{sleeve}</div>
                          <div className="text-[10px] font-semibold text-slate-500">{items.reduce((sum, fund) => sum + (Number(fund.weight) || 0), 0)} % ve složce</div>
                        </div>
                        <div>
                          {items.map((fund, rowIndex) => {
                            const originalIndex = funds.findIndex((f) => f === fund);
                            const isin = isinFor(fund.name);
                            return (
                              <div key={`${fund.name}-${originalIndex}`} className={`grid grid-cols-[minmax(0,1.5fr)_minmax(120px,0.75fr)_minmax(88px,0.5fr)_32px] gap-2 px-3 py-2.5 md:grid-cols-[minmax(0,1.7fr)_minmax(170px,0.9fr)_minmax(88px,0.5fr)_minmax(120px,0.7fr)_32px] ${rowIndex !== items.length - 1 ? 'border-b border-slate-100' : ''}`}>
                                <div className="min-w-0">
                                  <div className="truncate text-xs font-semibold ep-text-navy">{fund.name}</div>
                                  <div className="mt-0.5 text-[10px] text-slate-500">{isin ? `ISIN ${isin}` : 'ISIN doplníme'}</div>
                                  <div className="mt-1 text-[10px] text-slate-400 md:hidden">{renderAmountCell(fund, true)}</div>
                                </div>
                                <div className="flex items-center px-1">
                                  <input type="range" min={0} max={100} step={1} value={Math.min(fund.weight, 100)} onChange={(e) => updateFundWeight(originalIndex, e.target.value)} style={{ "--val": `${Math.min(fund.weight, 100)}%` }} className="ep-slider" aria-label="Slider váhy fondu" />
                                </div>
                                <div className="relative self-center">
                                  <input type="number" min={0} max={100} step={1} value={fund.weight} onChange={(e) => updateFundWeight(originalIndex, e.target.value)} className="no-spin w-full rounded-lg border border-slate-200 bg-white px-2.5 py-2 pr-7 text-right text-xs font-semibold tabular-nums ep-text-navy outline-none focus:border-ep-blue focus:ring-2 focus:ring-ep-blue/20" aria-label="Alokace fondu" onFocus={(e) => e.target.select()} />
                                  <span className="pointer-events-none absolute right-2.5 top-1/2 -translate-y-1/2 text-[10px] text-slate-500">%</span>
                                </div>
                                <div className="hidden self-center text-right text-xs font-semibold tabular-nums ep-text-navy md:block">{renderAmountCell(fund)}</div>
                                <button type="button" onClick={() => removeFund(originalIndex)} className="inline-flex h-7 w-7 items-center justify-center self-center rounded-md border border-transparent bg-transparent text-slate-400 transition hover:border-rose-200 hover:bg-rose-50 hover:text-rose-500" aria-label="Odebrat fond">×</button>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>

            {showSimulation && funds.length > 0 && (
              <div className="fade-in space-y-6">
                <div className="grid gap-6 xl:grid-cols-[minmax(0,1fr)_320px] xl:items-start">
                  <PerformanceChart
                    allocation={detailAllocation}
                    title="Detail vlastního portfolia"

                    baseStrategyId={customBaseStrategyId}
                  />
                  <HistoricalPerformanceSidebar stats={customStats} />
                </div>
              </div>
            )}
          </div>
        );
      }

        const [search, setSearch] = useState("");
        const [sortKey, setSortKey] = useState("p1y");
        const [sortDir, setSortDir] = useState("desc");
        const [selectedFunds, setSelectedFunds] = useState([]);
        const [chartTab, setChartTab] = useState("vyvoj"); // "vyvoj" | "pa"

        const perfData = FUND_PERF_DATA[currency] || {};

        // Build flat list of funds with data
        const allFunds = useMemo(() => {
          return Object.entries(perfData).map(([name, perf]) => ({
            name,
            category: getFundCategory(name, currency),
            p1y: perf.p1y,
            p3y: perf.p3y,
            p5y: perf.p5y,
          }));
        }, [currency, perfData]);

        const categories = useMemo(() => {
          const cats = new Set(allFunds.map((f) => f.category));
          return ["Vše", ...Array.from(cats).sort()];
        }, [allFunds]);

        const filtered = useMemo(() => {
          let list = allFunds;
          if (category !== "Vše") list = list.filter((f) => f.category === category);
          if (search.trim()) {
            const q = search.trim().toLowerCase();
            list = list.filter((f) => f.name.toLowerCase().includes(q));
          }
          list = [...list].sort((a, b) => {
            const aVal = a[sortKey];
            const bVal = b[sortKey];
            if (aVal === null && bVal === null) return 0;
            if (aVal === null) return 1;
            if (bVal === null) return -1;
            return sortDir === "asc" ? aVal - bVal : bVal - aVal;
          });
          return list;
        }, [allFunds, category, search, sortKey, sortDir]);

        const toggleSort = (key) => {
          if (sortKey === key) setSortDir((d) => (d === "asc" ? "desc" : "asc"));
          else { setSortKey(key); setSortDir("desc"); }
        };

        const toggleFund = (name) => {
          setSelectedFunds((prev) =>
            prev.includes(name)
              ? prev.filter((n) => n !== name)
              : prev.length >= 8
              ? [...prev.slice(1), name]
              : [...prev, name]
          );

          () => allFunds.filter((f) => selectedFunds.includes(f.name)),

          const pts = [
            { year: "Výchozí" },
            { year: "1 rok" },
            { year: "3 roky" },
            { year: "5 let" },
          ];
          compFunds.forEach((f, idx) => {
            pts[0][f.name] = 100;
            pts[1][f.name] = f.p1y !== null ? +(100 * Math.pow(1 + f.p1y / 100, 1)).toFixed(2) : null;
            pts[2][f.name] = f.p3y !== null ? +(100 * Math.pow(1 + f.p3y / 100, 3)).toFixed(2) : null;
            pts[3][f.name] = f.p5y !== null ? +(100 * Math.pow(1 + f.p5y / 100, 5)).toFixed(2) : null;
          });
          return pts;
        }, [compFunds]);

            { horizon: "1 rok p.a.", ...Object.fromEntries(compFunds.map((f) => [f.name, f.p1y])) },
            { horizon: "3 roky p.a.", ...Object.fromEntries(compFunds.map((f) => [f.name, f.p3y])) },
            { horizon: "5 let p.a.", ...Object.fromEntries(compFunds.map((f) => [f.name, f.p5y])) },

        };

          if (v === null || v === undefined) return <span className="text-slate-400">–</span>;
          const positive = v >= 0;
          return (
            <span className={"font-semibold tabular-nums " + (positive ? "text-emerald-600" : "text-rose-600")}>
              {(positive ? "+" : "") + v.toFixed(2)} %

                          <button key={opt.id} type="button" role="tab" aria-selected={chartTab === opt.id}
                            onClick={() => setChartTab(opt.id)}
                            className={"rounded-full px-4 py-1.5 text-xs font-semibold tracking-wide transition-all " +
                              (chartTab === opt.id ? "bg-ep-navy text-white shadow-sm" : "text-slate-600 hover:text-slate-900")}>
                            {opt.label}
                          </button>
                        ))}
                      </div>
                    </div>

                    {/* Legend */}
                    <div className="mb-4 flex flex-wrap gap-3">
                      {compFunds.map((f, idx) => (
                        <div key={f.name} className="flex items-center gap-1.5 text-xs text-slate-700">
                          <span className="h-2.5 w-2.5 rounded-full" style={{ backgroundColor: NENI_FUND_COLORS[idx % NENI_FUND_COLORS.length] }} />
                          <span className="font-medium">{f.name}</span>
                        </div>
                      ))}
                    </div>

                    <div className="h-[340px] w-full md:h-[400px]">
                      {chartTab === "vyvoj" ? (
                        <ResponsiveContainer width="100%" height="100%">
                          <LineChart data={growthData} margin={{ top: 8, right: 16, left: 0, bottom: 0 }}>
                            <CartesianGrid stroke="rgba(148,163,184,0.18)" vertical={false} />
                            <XAxis dataKey="year" tick={{ fontSize: 11, fill: "#64748b" }} tickLine={false} axisLine={{ stroke: "rgba(148,163,184,0.3)" }} />
                            <YAxis tickFormatter={(v) => v.toFixed(0)} tick={{ fontSize: 11, fill: "#64748b" }} tickLine={false} axisLine={{ stroke: "rgba(148,163,184,0.3)" }} width={54} />
                            <Tooltip
                              formatter={(v, name) => v !== null ? [`${Number(v).toFixed(1)}`, name] : ["–", name]}
                              labelStyle={{ fontWeight: 600, color: "#0a1e3f", marginBottom: 4 }}
                              contentStyle={{ borderRadius: 12, border: "1px solid #e2e8f0", fontSize: 12 }}
                            />
                            <ReferenceLine y={100} stroke="#94a3b8" strokeDasharray="4 3" strokeWidth={1} />
                            {compFunds.map((f, idx) => (
                              <Line
                                key={f.name}
                                type="monotone"
                                dataKey={f.name}
                                name={f.name}
                                stroke={NENI_FUND_COLORS[idx % NENI_FUND_COLORS.length]}
                                strokeWidth={2.5}
                                dot={{ r: 5, fill: NENI_FUND_COLORS[idx % NENI_FUND_COLORS.length], strokeWidth: 0 }}
                                connectNulls={false}
                                activeDot={{ r: 6 }}
                              />
                            ))}
                          </LineChart>
                        </ResponsiveContainer>
                      ) : (
                        <ResponsiveContainer width="100%" height="100%">
                          <BarChart data={barData} margin={{ top: 8, right: 16, left: 0, bottom: 0 }}>
                            <CartesianGrid stroke="rgba(148,163,184,0.18)" vertical={false} />
                            <XAxis dataKey="horizon" tick={{ fontSize: 11, fill: "#64748b" }} tickLine={false} axisLine={{ stroke: "rgba(148,163,184,0.3)" }} />
                            <YAxis tickFormatter={(v) => `${v > 0 ? "+" : ""}${Number(v).toFixed(0)} %`} tick={{ fontSize: 11, fill: "#64748b" }} tickLine={false} axisLine={{ stroke: "rgba(148,163,184,0.3)" }} width={62} />
                            <Tooltip
                              formatter={(v, name) => v !== null ? [`${v > 0 ? "+" : ""}${Number(v).toFixed(2)} %`, name] : ["–", name]}
                              labelStyle={{ fontWeight: 600, color: "#0a1e3f", marginBottom: 4 }}
                              contentStyle={{ borderRadius: 12, border: "1px solid #e2e8f0", fontSize: 12 }}
                            />
                            <ReferenceLine y={0} stroke="#94a3b8" strokeWidth={1} />
                            {compFunds.map((f, idx) => (
                              <Bar
                                key={f.name}
                                dataKey={f.name}
                                name={f.name}
                                fill={NENI_FUND_COLORS[idx % NENI_FUND_COLORS.length]}
                                radius={[4, 4, 0, 0]}
                                maxBarSize={40}
                              />
                            ))}
                          </BarChart>
                        </ResponsiveContainer>
                      )}
                    </div>

                    {/* Summary stats for selected funds */}
                    <div className="mt-5 overflow-x-auto">
                      <table className="w-full min-w-[560px] border-collapse text-sm">
                        <thead>
                          <tr className="border-b border-slate-200">
                            <th className="px-3 py-2 text-left text-[10px] font-semibold uppercase tracking-widest text-slate-500">Fond</th>
                            <th className="px-3 py-2 text-right text-[10px] font-semibold uppercase tracking-widest text-slate-500">1 rok p.a.</th>
                            <th className="px-3 py-2 text-right text-[10px] font-semibold uppercase tracking-widest text-slate-500">3 roky p.a.</th>
                            <th className="px-3 py-2 text-right text-[10px] font-semibold uppercase tracking-widest text-slate-500">5 let p.a.</th>
                            <th className="px-3 py-2 text-right text-[10px] font-semibold uppercase tracking-widest text-slate-500">Kumulativně 5 let</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100">
                          {compFunds.map((f, idx) => {
                            const cum5 = f.p5y !== null ? (Math.pow(1 + f.p5y / 100, 5) - 1) * 100 : null;
                            return (
                              <tr key={f.name}>
                                <td className="flex items-center gap-2 px-3 py-2">
                                  <span className="h-2.5 w-2.5 rounded-full shrink-0" style={{ backgroundColor: NENI_FUND_COLORS[idx % NENI_FUND_COLORS.length] }} />
                                  <span className="text-xs font-semibold text-slate-700">{f.name}</span>
                                </td>
                                <td className="px-3 py-2 text-right">{fmtPct(f.p1y)}</td>
                                <td className="px-3 py-2 text-right">{fmtPct(f.p3y)}</td>
                                <td className="px-3 py-2 text-right">{fmtPct(f.p5y)}</td>
                                <td className="px-3 py-2 text-right">{fmtPct(cum5 !== null ? +cum5.toFixed(2) : null)}</td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </section>
                )}
              </div>

              <footer className="mt-10 border-t border-slate-200 pt-6 text-center text-xs text-slate-500">
                © {new Date().getFullYear()} Erste Premier — Demo · Výkonnosti vycházejí z historických dat. Nejedná se o investiční doporučení.
              </footer>
            </main>
          </div>
        );
      }

      function App() {
        const [screen, setScreen] = useState("home");

        useEffect(() => {
          const loader = document.getElementById("boot-loader");
          if (loader) {
            loader.style.opacity = "0";
            setTimeout(() => loader.remove(), 400);
          }
        }, []);

        if (screen === "home") return <HomeScreen onNavigate={setScreen} />;
        if (screen === "neni-investice") return <NeniInvesticeApp onBack={() => setScreen("home")} />;
        return (
          <InvestmentProvider>
            <Index />
          </InvestmentProvider>
        );
      }

      /* ------------------------------------------------------------------ */
      /*  Mount                                                              */
      /* ------------------------------------------------------------------ */
      const rootEl = document.getElementById("root");
      ReactDOM.createRoot(rootEl).render(<App />);

    </script>
  </body>
</html>
